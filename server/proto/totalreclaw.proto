syntax = "proto3";

package totalreclaw;

// ============ Common Messages ============

message TotalReclawFact {
  string id = 1;                    // UUIDv7 (time-sortable)
  string timestamp = 2;             // ISO 8601
  string owner = 3;                 // user_id from auth
  bytes encrypted_blob = 4;         // AES-256-GCM encrypted (doc + embedding + metadata)
  repeated string blind_indices = 5; // SHA-256(token) + SHA-256(LSH bucket)
  double decay_score = 6;
  bool is_active = 7;
  int32 version = 8;
  string source = 9;                // conversation | pre_compaction | explicit | etc.
  // --- Added in v0.3.1b ---
  string content_fp = 10;           // HMAC-SHA256 content fingerprint (for dedup)
  string agent_id = 11;             // identifier of the agent that created this fact
  int64 sequence_id = 12;           // monotonic per-user, for delta sync
  // --- Added in PoC v2 (LSH + reranking) ---
  string encrypted_embedding = 13;  // AES-256-GCM encrypted embedding vector (hex-encoded)
}

enum ErrorCode {
  OK = 0;
  INVALID_REQUEST = 1;
  UNAUTHORIZED = 2;
  RATE_LIMITED = 3;
  NOT_FOUND = 4;
  INTERNAL_ERROR = 5;
  VERSION_CONFLICT = 6;
  USER_EXISTS = 7;
  STORAGE_ERROR = 8;
  AUTH_FAILED = 9;
  DUPLICATE_CONTENT = 10;           // v0.3.1b: content fingerprint match
}

// ============ Registration ============

message RegisterRequest {
  bytes auth_key_hash = 1;    // SHA256(HKDF(master_password, salt, "auth"))
  bytes salt = 2;              // 32 random bytes
}

message RegisterResponse {
  bool success = 1;
  string user_id = 2;          // Server-generated UUIDv7
  ErrorCode error_code = 3;
  string error_message = 4;
}

// ============ Store ============

message StoreRequest {
  string user_id = 1;
  bytes auth_proof = 2;         // HMAC of request with auth_key (future use)
  repeated TotalReclawFact facts = 3;
}

message StoreResponse {
  bool success = 1;
  repeated string ids = 2;      // IDs of stored facts
  ErrorCode error_code = 3;
  string error_message = 4;
  int32 version = 5;            // For optimistic locking
  // --- Added in v0.3.1b ---
  repeated string duplicate_ids = 6;  // fact IDs that were rejected as duplicates
}

// ============ Search ============

message SearchRequest {
  string user_id = 1;
  bytes auth_proof = 2;
  repeated string blind_trapdoors = 3;   // LSH + keyword trapdoors from client
  int32 max_candidates = 4;              // Default 3000
  double min_decay_score = 5;            // Default 0.0
}

message SearchResult {
  string fact_id = 1;
  bytes encrypted_blob = 2;
  double decay_score = 3;
  int64 timestamp = 4;
  int32 version = 5;
  string encrypted_embedding = 6;   // PoC v2: encrypted embedding for client-side cosine similarity
}

message SearchResponse {
  bool success = 1;
  ErrorCode error_code = 2;
  string error_message = 3;
  repeated SearchResult results = 4;
  int32 total_candidates = 5;
}

// ============ Health ============

message HealthResponse {
  string status = 1;
  string version = 2;
  string database = 3;
}

// ============ Update ============

message UpdateRequest {
  string user_id = 1;
  bytes auth_proof = 2;
  repeated TotalReclawFact facts = 3;
}

message UpdateResponse {
  bool success = 1;
  repeated string ids = 2;
  ErrorCode error_code = 3;
  string error_message = 4;
}

// ============ Delete ============

message DeleteRequest {
  string user_id = 1;
  bytes auth_proof = 2;
  string fact_id = 3;
}

message DeleteResponse {
  bool success = 1;
  ErrorCode error_code = 2;
  string error_message = 3;
}

// ============ Export ============

message ExportRequest {
  string user_id = 1;
  bytes auth_proof = 2;
}

message ExportResponse {
  bool success = 1;
  ErrorCode error_code = 2;
  string error_message = 3;
  repeated TotalReclawFact facts = 4;
}

// ============ Sync (v0.3.1b) ============

message SyncRequest {
  int64 since_sequence = 1;              // agent's last known sequence_id
  int32 limit = 2;                       // max facts to return (default 1000)
}

message SyncResponse {
  repeated TotalReclawFact facts = 1;
  int64 latest_sequence = 2;             // current highest sequence_id for this user
  bool has_more = 3;                     // true if more facts beyond limit
}
