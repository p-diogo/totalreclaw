# TotalReclaw PoC Docker Compose
#
# IMPORTANT: All ports bound to 127.0.0.1 ONLY
# This prevents external access during development
#
# Setup:
#   1. Copy .env.example to .env
#   2. Edit .env with your own POSTGRES_PASSWORD
#   3. docker-compose up
#
# Usage:
#   docker-compose up          # Start services
#   docker-compose up -d       # Start in background
#   docker-compose down        # Stop services
#   docker-compose down -v     # Stop and remove volumes

services:
  # ============ TotalReclaw Server ============
  totalreclaw-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: totalreclaw-poc
    restart: unless-stopped

    # Network security - localhost ONLY
    ports:
      - "127.0.0.1:8080:8080"

    env_file:
      - .env

    environment:
      - HOST=0.0.0.0
      - PORT=8080

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - totalreclaw-internal

    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: false

  # ============ PostgreSQL Database ============
  postgres:
    image: postgres:16
    container_name: totalreclaw-db
    restart: unless-stopped

    # Network security - localhost ONLY
    ports:
      - "127.0.0.1:5432:5432"

    env_file:
      - .env

    volumes:
      - totalreclaw-data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-totalreclaw} -d ${POSTGRES_DB:-totalreclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - totalreclaw-internal

    # Security hardening
    security_opt:
      - no-new-privileges:true

  # ============ Caddy Reverse Proxy ============
  caddy:
    image: caddy:2-alpine
    container_name: totalreclaw-caddy
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

    environment:
      - DOMAIN=${DOMAIN:-localhost}

    depends_on:
      totalreclaw-server:
        condition: service_healthy

    networks:
      - totalreclaw-internal

    # Security hardening
    security_opt:
      - no-new-privileges:true

# ============ Networks ============
networks:
  totalreclaw-internal:
    driver: bridge
    # Internal network - no external internet access
    # internal: true  # Uncomment for full isolation

# ============ Volumes ============
volumes:
  totalreclaw-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
