specVersion: 0.0.5
description: TotalReclaw — Zero-knowledge encrypted memory vault subgraph
repository: https://github.com/p-diogo/totalreclaw
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: EventfulDataEdge
    # Local dev: hardhat | Production: gnosis | Testnet: chiado
    # deploy-contracts.sh updates address + startBlock for localhost deploys
    network: hardhat
    source:
      # IMPORTANT: Replace with actual deployed address from contracts/deployed-addresses.json
      address: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      abi: EventfulDataEdge
      # IMPORTANT: Replace with actual deployment block from contracts/deployed-addresses.json
      startBlock: 2
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Fact
        - BlindIndex
        - GlobalState
      abis:
        - name: EventfulDataEdge
          file: ./abis/EventfulDataEdge.json
      eventHandlers:
        - event: Log(bytes)
          handler: handleLog
      file: ./src/mapping.ts
