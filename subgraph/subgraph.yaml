specVersion: 0.0.5
description: TotalReclaw — Zero-knowledge encrypted memory vault subgraph
repository: https://github.com/p-diogo/totalreclaw
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: EventfulDataEdge
    # Local dev: hardhat | Production: gnosis | Testnet: gnosis-chiado
    # deploy-contracts.sh updates address + startBlock for localhost deploys
    network: gnosis-chiado
    source:
      address: "0x16C4fDBa8da731995ADFC367727b5929893f0B20"
      abi: EventfulDataEdge
      startBlock: 20125067
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Fact
        - BlindIndex
        - GlobalState
      abis:
        - name: EventfulDataEdge
          file: ./abis/EventfulDataEdge.json
      eventHandlers:
        - event: Log(bytes)
          handler: handleLog
      file: ./src/mapping.ts
