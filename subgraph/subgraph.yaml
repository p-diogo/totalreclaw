specVersion: 0.0.5
description: OpenMemory — Zero-knowledge encrypted memory vault subgraph
repository: https://github.com/p-diogo/openmemory
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: EventfulDataEdge
    network: base-sepolia
    source:
      # IMPORTANT: Replace with actual deployed address from contracts/deployed-addresses.json
      address: "0x0000000000000000000000000000000000000000"
      abi: EventfulDataEdge
      # IMPORTANT: Replace with actual deployment block from contracts/deployed-addresses.json
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - FactEntity
        - GlobalState
      abis:
        - name: EventfulDataEdge
          file: ./abis/EventfulDataEdge.json
      eventHandlers:
        - event: Log(bytes)
          handler: handleLog
      file: ./src/mapping.ts
