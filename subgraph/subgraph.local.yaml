specVersion: 0.0.5
description: "TotalReclaw \u2014 End-to-end encrypted memory vault subgraph"
repository: https://github.com/p-diogo/totalreclaw
schema:
  file: ./schema.graphql
dataSources:
- kind: ethereum
  name: EventfulDataEdge
  network: localanvil
  source:
    address: '0xC445af1D4EB9fce4e1E61fE96ea7B8feBF03c5ca'
    abi: EventfulDataEdge
    startBlock: 0
  mapping:
    kind: ethereum/events
    apiVersion: 0.0.7
    language: wasm/assemblyscript
    entities:
    - Fact
    - BlindIndex
    - GlobalState
    abis:
    - name: EventfulDataEdge
      file: ./abis/EventfulDataEdge.json
    eventHandlers:
    - event: Log(bytes)
      handler: handleLog
    file: ./src/mapping.ts
