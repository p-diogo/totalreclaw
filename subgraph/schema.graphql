"""
TotalReclaw Fact Entity — indexed from EventfulDataEdge Log events.

All text fields are encrypted (the subgraph stores ciphertext, not plaintext).
The `owner` field is the Smart Account address derived from the user's BIP-39 seed.
Clients query by owner address, download encrypted blobs, and decrypt locally.
"""
type FactEntity @entity {
  "Fact ID extracted from the Protobuf payload (UUIDv7 as hex string)"
  id: ID!

  "Smart Account address of the fact owner (from tx.from)"
  owner: Bytes!

  "Full encrypted Protobuf blob (the raw Log event data)"
  encryptedBlob: Bytes!

  "Blind indices for searchable encryption (SHA-256 hashes)"
  blindIndices: [String!]!

  "Decay score (0.0 to 1.0) — facts below 0.3 are considered inactive"
  decayScore: BigDecimal!

  "Whether this fact is active (decayScore >= 0.3)"
  isActive: Boolean!

  "Block timestamp when this fact was written"
  timestamp: BigInt!

  "Block number for ordering"
  blockNumber: BigInt!

  "Transaction hash for traceability"
  txHash: Bytes!

  "Content fingerprint for dedup (HMAC-SHA256, hex string). Empty if not provided."
  contentFp: String!

  "Monotonic sequence ID for sync protocol"
  sequenceId: BigInt!

  "Agent ID that wrote this fact (for multi-agent scenarios)"
  agentId: String!

  "Protobuf version field for forward compatibility"
  version: Int!

  "Source of the fact (conversation, pre_compaction, explicit, etc.)"
  source: String!
}

"""
Global counter for generating monotonic sequence IDs.
Single instance with id = 'global'.
"""
type GlobalState @entity {
  id: ID!
  nextSequenceId: BigInt!
  totalFacts: BigInt!
  lastUpdated: BigInt!
}
