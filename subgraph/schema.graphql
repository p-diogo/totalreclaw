"""
TotalReclaw Subgraph Schema v3
Key change: agentId and source removed — now encrypted inside blob (v3 privacy).
"""

type Fact @entity(immutable: false) {
  id: ID!
  "Smart Account address (owner of this fact)"
  owner: Bytes!
  "XChaCha20-Poly1305 encrypted blob (contains text + agentId + source)"
  encryptedBlob: Bytes!
  "XChaCha20-Poly1305 encrypted embedding vector (640d Harrier). Nullable for v1/v2 facts."
  encryptedEmbedding: String
  "Decay score (0.0-1.0). Facts below 0.3 are considered inactive."
  decayScore: BigDecimal!
  "Whether this fact is active (decayScore >= 0.3)"
  isActive: Boolean!
  "HMAC-SHA256 content fingerprint for dedup (hex)"
  contentFp: String!
  "Monotonic sequence ID for delta sync"
  sequenceId: BigInt!
  "Protobuf schema version"
  version: Int!
  "Block number when this fact was written"
  blockNumber: BigInt!
  "Block timestamp"
  timestamp: BigInt!
  "Client-generated timestamp (when fact was originally created). Falls back to block timestamp for pre-migration or malformed payloads."
  createdAt: BigInt!
  "Transaction hash"
  txHash: Bytes!
  "Derived: all blind index entries for this fact"
  blindIndexEntries: [BlindIndex!]! @derivedFrom(field: "fact")
}

type BlindIndex @entity(immutable: true) {
  id: ID!
  "The SHA-256 blind hash value"
  hash: String!
  "The fact this index belongs to"
  fact: Fact!
  "Owner address (denormalized for efficient filtering)"
  owner: Bytes!
}

type GlobalState @entity(immutable: false) {
  id: ID!
  "Next monotonic sequence ID"
  nextSequenceId: BigInt!
  "Total facts indexed"
  totalFacts: BigInt!
  "Last updated block timestamp"
  lastUpdated: BigInt!
}
