services:
  # --- OpenClaw with TotalReclaw plugin ---
  openclaw:
    build:
      context: ../..
      dockerfile: tests/e2e-guide-validation/Dockerfile.openclaw
    environment:
      ZAI_API_KEY: "${ZAI_API_KEY}"
      TOTALRECLAW_SERVER_URL: "https://api.totalreclaw.xyz"
      TOTALRECLAW_MASTER_PASSWORD: "abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about"
      TOTALRECLAW_SUBGRAPH_MODE: "true"
      TOTALRECLAW_CHAIN_ID: "10200"
      TOTALRECLAW_DATA_EDGE_ADDRESS: "0xA84c5433110Ccc93e57ec387e630E86Bad86c36f"
      TOTALRECLAW_EXTRACT_EVERY_TURNS: "1"
      OPENCLAW_GATEWAY_TOKEN: "guide-test-token-2026"
      OPENCLAW_RAW_STREAM: "1"
      PI_RAW_STREAM: "1"
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - totalreclaw-creds:/home/node/.totalreclaw
      - openclaw-config:/home/node/.openclaw
    tmpfs:
      - /tmp:size=100M
    security_opt:
      - no-new-privileges

volumes:
  totalreclaw-creds:
  openclaw-config:
