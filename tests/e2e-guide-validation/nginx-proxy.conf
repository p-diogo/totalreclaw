# Reverse proxy that splits traffic:
#   /v1/subgraph -> local graph-node (GraphQL)
#   everything else -> api.totalreclaw.xyz (relay server)

upstream graph_node {
    server graph-node:8000;
}

server {
    listen 80;

    # Health check for the proxy itself
    location /health {
        return 200 '{"status":"ok","proxy":"subgraph-proxy"}';
        add_header Content-Type application/json;
    }

    # Subgraph GraphQL queries -> local Graph Node
    # The plugin posts to /v1/subgraph, we route to graph-node's
    # /subgraphs/name/totalreclaw/graphql endpoint
    location /v1/subgraph {
        proxy_pass http://graph_node/subgraphs/name/totalreclaw;
        proxy_set_header Host $host;
        proxy_set_header Content-Type "application/json";
    }

    # Everything else -> production relay server
    location / {
        proxy_pass https://api.totalreclaw.xyz;
        proxy_set_header Host api.totalreclaw.xyz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
}
