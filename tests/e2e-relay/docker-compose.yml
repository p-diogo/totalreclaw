version: "3.8"
# E2E test infrastructure for totalreclaw-relay.
#
# Usage:
#   docker compose up -d
#   npx tsx smoke-test.ts
#   docker compose down -v
#
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: totalreclaw_relay
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d totalreclaw_relay"]
      interval: 2s
      timeout: 5s
      retries: 10

  relay:
    build:
      context: ../../totalreclaw-relay
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://relay:relay@postgres:5432/totalreclaw_relay
      PORT: "8080"
      PIMLICO_API_KEY: ${PIMLICO_API_KEY:-}
      PIMLICO_CHAIN_ID: ${PIMLICO_CHAIN_ID:-84532}
      PIMLICO_WEBHOOK_SECRET: ${PIMLICO_WEBHOOK_SECRET:-test-secret}
      DATA_EDGE_ADDRESS: ${DATA_EDGE_ADDRESS:-0xC445af1D4EB9fce4e1E61fE96ea7B8feBF03c5ca}
      ENTRY_POINT_ADDRESS: ${ENTRY_POINT_ADDRESS:-0x0000000071727De22E5E9d8BAf0edAc6f37da032}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      COINBASE_COMMERCE_API_KEY: ${COINBASE_COMMERCE_API_KEY:-}
      COINBASE_COMMERCE_WEBHOOK_SECRET: ${COINBASE_COMMERCE_WEBHOOK_SECRET:-}
      SUBGRAPH_ENDPOINT: ${SUBGRAPH_ENDPOINT:-}
      FREE_TIER_WRITES_PER_MONTH: "250"
      FREE_TIER_READS_PER_MONTH: "1000"
    ports:
      - "28080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10
