services:
  postgres:
    image: postgres:16
    ports:
      - "127.0.0.1:35432:5432"
    environment:
      POSTGRES_USER: totalreclaw
      POSTGRES_PASSWORD: test-password
      POSTGRES_DB: totalreclaw
      POSTGRES_INITDB_ARGS: "--lc-collate=C --lc-ctype=C"
    volumes:
      - ../../server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./init-subscriptions.sql:/docker-entrypoint-initdb.d/02-subscriptions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U totalreclaw"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    networks:
      - e2e-integration

  mock-services:
    build:
      context: .
      dockerfile: Dockerfile.mock-services
    ports:
      - "127.0.0.1:39090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://127.0.0.1:9090/health || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 3s
    networks:
      - e2e-integration

  totalreclaw-server:
    build:
      context: ../../server
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:38080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mock-services:
        condition: service_healthy
    # All keys are test-only values. Real keys are in .env (not committed).
    environment:
      DATABASE_URL: "postgresql+asyncpg://totalreclaw:test-password@postgres:5432/totalreclaw"
      HOST: "0.0.0.0"
      PORT: "8080"
      DEBUG: "true"
      ENVIRONMENT: "test"
      CORS_ORIGINS: "*"
      FREE_TIER_WRITES_PER_MONTH: "5"
      FREE_TIER_READS_PER_MONTH: "10"
      SUBGRAPH_ENDPOINT: "http://mock-services:9090/subgraph"
      PIMLICO_BUNDLER_URL: "http://mock-services:9090/bundler"
      DATA_EDGE_ADDRESS: "0xC445af1D4EB9fce4e1E61fE96ea7B8feBF03c5ca"
      ENTRY_POINT_ADDRESS: "0x0000000071727De22E5E9d8BAf0edAc6f37da032"
      # API keys — test-only fake values (never use real keys in tests)
      PIMLICO_API_KEY: "test_pimlico_key_for_e2e"
      STRIPE_SECRET_KEY: "sk_test_fake_for_e2e"
      STRIPE_PRICE_ID: "price_test_123"
      # Webhook secrets must use test values so webhook-helpers.ts can compute valid signatures
      STRIPE_WEBHOOK_SECRET: "whsec_test_secret_for_e2e"
      # High rate limits for E2E tests (all requests come from same IP)
      RATE_LIMIT_REGISTER_PER_HOUR: "200"
      RATE_LIMIT_STORE_PER_HOUR: "5000"
      RATE_LIMIT_SEARCH_PER_HOUR: "5000"
      RATE_LIMIT_ACCOUNT_PER_HOUR: "200"
      RATE_LIMIT_SYNC_PER_HOUR: "5000"
    security_opt:
      - no-new-privileges
    networks:
      - e2e-integration

networks:
  e2e-integration:
    driver: bridge
