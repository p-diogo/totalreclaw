# TotalReclaw Benchmark Harness Configuration

# Dataset settings
dataset:
  # Which datasets to use (anchor, locomo, synthetic)
  tiers:
    - anchor
    - locomo
    - synthetic

  # Number of synthetic conversations to generate
  synthetic_count: 200

  # Random seed for reproducibility
  seed: 42

# Backend settings
backends:
  totalreclaw_e2ee:
    enabled: true
    server_url: "http://localhost:8080"

  openclaw_qmd:
    enabled: true
    server_url: "http://localhost:8081"

  openclaw_mem0:
    enabled: true
    server_url: "http://localhost:8082"
    api_key: "${MEM0_API_KEY}"

# Simulation settings
simulation:
  # Extract facts every N turns
  extraction_interval: 5

  # Query memories every N turns
  query_interval: 10

  # Number of memories to retrieve per query
  retrieval_k: 8

  # Minimum importance for retrieval
  min_importance: 5

# Judge settings
judge:
  # Model for downstream quality evaluation
  model: "claude-3-5-sonnet-20241022"

  # Scoring dimensions
  dimensions:
    - factual_correctness
    - preference_adherence
    - temporal_accuracy

# Report settings
report:
  output_dir: "reports"
  formats:
    - html
    - markdown
    - json
    - csv

  # Include charts
  charts:
    - accuracy_vs_latency
    - forgetting_curves
    - cost_comparison

# Latency targets (for pass/fail)
targets:
  max_latency_ms: 140  # p95 for 1M memories
  min_recall_percent: 93  # of true top-250
  max_storage_overhead: 2.2  # vs plaintext
