# OpenClaw Mem0 Configuration for OMBH Benchmark
#
# This configuration uses the Mem0 plugin for memory management.
# Mem0 is a cloud-based memory service with advanced features.
#
# Prerequisites:
#   - MEM0_API_KEY environment variable must be set
#   - Mem0 account and API access
#
# Features:
#   - Cloud-based memory storage
#   - Automatic memory extraction
#   - Semantic search
#   - User-level memory isolation

defaults:
  memory:
    # Mem0 Backend Configuration
    backend: mem0
    mem0:
      enabled: true
      # API Configuration
      apiKey: ${MEM0_API_KEY}
      baseUrl: ${MEM0_BASE_URL:-https://api.mem0.ai/v1}
      # Memory user ID (for isolation)
      userId: benchmark-user
      # Maximum memories to retrieve per query
      maxRetrieval: 8
      # Minimum relevance score for retrieval
      minRelevance: 0.5
      # Memory categories to include
      categories:
        - preferences
        - facts
        - instructions
      # Advanced settings
      advanced:
        # Include memory metadata in responses
        includeMetadata: true
        # Enable fact checking
        factCheck: false
        # Memory versioning
        versioning: true

    # Auto-extraction settings
    autoExtract:
      enabled: true
      # Extract facts every N turns
      interval: 5
      # Minimum importance for auto-storage (1-10)
      minImportanceForStore: 5
      # Maximum memories to include in context
      maxInContext: 8

  # LLM Provider Configuration
  model: ${OPENCLAW_LLM_MODEL:-glm-5}
  provider: ${OPENCLAW_LLM_PROVIDER:-zai}

# Benchmark Agent Configuration
agents:
  - name: benchmark-agent-mem0
    description: Benchmark agent using Mem0 memory backend
    systemPrompt: |
      You are a benchmark agent for testing memory capabilities.
      You should:
      1. Remember facts about the user across conversations
      2. Reference previously stored memories when relevant
      3. Extract important information for storage
      4. Be consistent in your responses based on stored memories
    memory:
      backend: mem0
      autoExtract:
        interval: 1  # Extract every turn for benchmarking
        minImportanceForStore: 1  # Store everything for benchmarking
      maxInContext: 8
      mem0:
        userId: benchmark-user-main

# Logging Configuration
logging:
  level: ${OPENCLAW_LOG_LEVEL:-info}
  format: json
  output:
    - stdout

# Security Settings
security:
  # Disable rate limiting for benchmarking
  rateLimit:
    enabled: false
  # CORS for benchmark harness
  cors:
    allowedOrigins:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
  # API key not required for benchmark endpoints
  auth:
    required: false

# Benchmark-specific settings
benchmark:
  enabled: true
  # Endpoint for benchmark harness
  api:
    prefix: /api
  # Metrics collection
  metrics:
    enabled: true
    collectLatency: true
    collectTokenUsage: true
