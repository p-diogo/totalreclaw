# OpenClaw QMD Configuration for OMBH Benchmark
#
# This configuration uses OpenClaw's native QMD (Queryable Memory Database) backend.
# QMD is a built-in memory system that stores memories locally without external dependencies.
#
# Features:
#   - Local file-based storage
#   - Vector embeddings for semantic search
#   - Automatic memory extraction
#   - Decay-based forgetting

defaults:
  memory:
    # QMD Backend Configuration
    backend: qmd
    qmd:
      enabled: true
      # Storage path (inside container)
      storagePath: /home/node/.openclaw/memory
      # Embedding model for semantic search
      embeddingModel: text-embedding-3-small
      # Maximum memories to retrieve per query
      maxRetrieval: 8
      # Minimum importance score for retrieval
      minImportance: 1
      # Memory decay settings
      decay:
        enabled: true
        halfLife: 604800  # 7 days in seconds
        minScore: 0.1
      # Index settings
      index:
        rebuildOnStart: false
        persistInterval: 300  # 5 minutes

    # Auto-extraction settings
    autoExtract:
      enabled: true
      # Extract facts every N turns
      interval: 5
      # Minimum importance for auto-storage (1-10)
      minImportanceForStore: 5
      # Maximum memories to include in context
      maxInContext: 8

  # LLM Provider Configuration
  model: ${OPENCLAW_LLM_MODEL:-glm-5}
  provider: ${OPENCLAW_LLM_PROVIDER:-zai}

# Benchmark Agent Configuration
agents:
  - name: benchmark-agent-qmd
    description: Benchmark agent using QMD memory backend
    systemPrompt: |
      You are a benchmark agent for testing memory capabilities.
      You should:
      1. Remember facts about the user across conversations
      2. Reference previously stored memories when relevant
      3. Extract important information for storage
      4. Be consistent in your responses based on stored memories
    memory:
      backend: qmd
      autoExtract:
        interval: 1  # Extract every turn for benchmarking
        minImportanceForStore: 1  # Store everything for benchmarking
      maxInContext: 8

# Logging Configuration
logging:
  level: ${OPENCLAW_LOG_LEVEL:-info}
  format: json
  output:
    - stdout

# Security Settings
security:
  # Disable rate limiting for benchmarking
  rateLimit:
    enabled: false
  # CORS for benchmark harness
  cors:
    allowedOrigins:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
  # API key not required for benchmark endpoints
  auth:
    required: false

# Benchmark-specific settings
benchmark:
  enabled: true
  # Endpoint for benchmark harness
  api:
    prefix: /api
  # Metrics collection
  metrics:
    enabled: true
    collectLatency: true
    collectTokenUsage: true
