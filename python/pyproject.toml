[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "totalreclaw"
version = "1.4.0"
description = "End-to-end encrypted memory for AI agents — Python client"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "TotalReclaw Team" }]
dependencies = [
    "totalreclaw-core>=1.1.0",
    "httpx>=0.27",
    "onnxruntime>=1.24",
    "numpy>=1.26",
    "PyStemmer>=2.2",
    "transformers>=4.40",
    "huggingface-hub>=0.23",
    "eth-account>=0.13",
]

[project.optional-dependencies]
# hermes-agent is not on PyPI — install manually: pip install git+https://github.com/NousResearch/hermes-agent.git
dev = ["pytest>=8.0", "pytest-asyncio>=0.24", "pytest-xdist>=3.5", "mnemonic>=0.21"]

[project.entry-points."hermes_agent.plugins"]
totalreclaw = "totalreclaw.hermes"

[tool.setuptools.package-data]
"totalreclaw.hermes" = ["plugin.yaml"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
