name: totalreclaw
version: 2.3.1rc26
description: End-to-end encrypted memory vault for AI agents (Memory Taxonomy v1)
author: TotalReclaw Team
provides_tools:
  - totalreclaw_remember
  - totalreclaw_recall
  - totalreclaw_forget
  - totalreclaw_export
  - totalreclaw_status
  - totalreclaw_pair
  - totalreclaw_pin
  - totalreclaw_unpin
  - totalreclaw_retype
  - totalreclaw_set_scope
  - totalreclaw_import_from
  - totalreclaw_import_batch
  - totalreclaw_import_status
  - totalreclaw_import_abort
  - totalreclaw_upgrade
  - totalreclaw_debrief
provides_hooks:
  - on_session_start
  - pre_llm_call
  - post_llm_call
  - on_session_end
  - on_session_finalize
  - on_session_reset
# Issue #275 — Path B MemoryProvider integration. The provider class
# (totalreclaw.hermes.memory_provider.TotalReclawMemoryProvider) is
# installed at $HERMES_HOME/plugins/memory/totalreclaw/__init__.py by
# the `hermes install-memory-provider` CLI subcommand — not auto-loaded
# from this plugin manifest. This key advertises the available
# provider for manifest-parity tests + future tooling.
provides_memory_provider:
  - totalreclaw
