# Docker Compose for NanoClaw + TotalReclaw functional test
#
# Services:
#   postgres          — PostgreSQL 16 for TotalReclaw server
#   totalreclaw-server — FastAPI server (E2EE memory vault)
#   nanoclaw-agent    — NanoClaw container with TotalReclaw overlay (profile: agent)
#
# The nanoclaw-agent service uses profiles so it does NOT auto-start.
# The test runner starts it explicitly via `docker run`.
#
# Ports use non-standard values (5433, 8090) to avoid conflicts
# with the OpenClaw functional test stack.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: totalreclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test}
      POSTGRES_DB: totalreclaw
    volumes:
      - nanoclaw-test-db:/var/lib/postgresql/data
    networks:
      - nanoclaw-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U totalreclaw -d totalreclaw"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5433:5432"

  totalreclaw-server:
    build:
      context: ../../server
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8090:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://totalreclaw:${POSTGRES_PASSWORD:-test}@postgres:5432/totalreclaw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nanoclaw-test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50M,mode=1777

  # Template for agent containers. NOT auto-started.
  # The test runner builds and runs this via `docker run`.
  nanoclaw-agent:
    build:
      context: .
      dockerfile: Dockerfile.nanoclaw-totalreclaw
    profiles:
      - agent
    networks:
      - nanoclaw-test
    environment:
      TOTALRECLAW_SERVER_URL: http://totalreclaw-server:8080
    volumes:
      # Overlay: modified agent-runner source files
      - ./nanoclaw-totalreclaw-overlay/agent-runner-src/index.ts:/app/src/index.ts:ro
      - ./nanoclaw-totalreclaw-overlay/agent-runner-src/totalreclaw-mcp.ts:/app/src/totalreclaw-mcp.ts:ro
      # Overlay: TotalReclaw skill instructions
      - ./nanoclaw-totalreclaw-overlay/skills/totalreclaw:/app/skills/totalreclaw:ro
      # Persistent credentials volume
      - nanoclaw-totalreclaw-credentials:/workspace/.totalreclaw
    stdin_open: true

networks:
  nanoclaw-test:
    driver: bridge

volumes:
  nanoclaw-test-db:
  nanoclaw-totalreclaw-credentials:
