services:
  # TotalReclaw Server (existing)
  totalreclaw-server:
    build:
      context: ../../server
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://totalreclaw:${POSTGRES_PASSWORD:-test}@postgres:5432/totalreclaw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - totalreclaw-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50M,mode=1777

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: totalreclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test}
      POSTGRES_DB: totalreclaw
    volumes:
      - test-db-data:/var/lib/postgresql/data
    networks:
      - totalreclaw-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U totalreclaw -d totalreclaw"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true

  # OpenClaw Test Instance
  # When running standalone (--no-deps), also connect to
  # server_totalreclaw-internal network:
  #   docker network connect server_totalreclaw-internal openclaw-test
  openclaw-test:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
    container_name: openclaw-test
    ports:
      # Gateway WebSocket + Control UI on port 18789
      - "127.0.0.1:8081:18789"
    networks:
      - totalreclaw-internal
    security_opt:
      - no-new-privileges:true
    user: "0:0"
    tmpfs:
      - /tmp:size=100M,mode=1777
    volumes:
      - type: bind
        source: ./openclaw-config
        target: /config
      - type: bind
        source: ../../skill/SKILL.md
        target: /app/skills/totalreclaw/SKILL.md
        read_only: true
      - type: bind
        source: ../../skill/plugin
        target: /app/extensions/totalreclaw
        read_only: true
      - openclaw-state:/home/node/.openclaw
      - totalreclaw-credentials:/home/node/.totalreclaw
    environment:
      - OPENCLAW_LLM_PROVIDER=zai
      - OPENCLAW_LLM_MODEL=glm-5
      - ZAI_API_KEY=${ZAI_API_KEY}
      - OPENCLAW_CONFIG_PATH=/config/config.json5
      - TOTALRECLAW_SERVER_URL=http://totalreclaw-server:8080
      - TOTALRECLAW_MASTER_PASSWORD=${TOTALRECLAW_MASTER_PASSWORD:-test-master-password-for-functional-tests}
      - HOME=/home/node
    profiles:
      - functional-test
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  totalreclaw-internal:
    driver: bridge

volumes:
  test-db-data:
    driver: local
  openclaw-state:
    driver: local
  totalreclaw-credentials:
    driver: local
