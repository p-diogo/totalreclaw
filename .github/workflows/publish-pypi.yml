name: Publish totalreclaw-core to PyPI

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'stable or rc (appends rc<N>; pip install ignores pre-release by default, users pin explicitly)'
        required: false
        type: choice
        options:
          - stable
          - rc
        default: stable
      rc-number:
        description: 'RC increment (1, 2, 3...) — only used when release-type=rc'
        required: false
        type: number
        default: 1
      dry-run:
        description: 'Dry run (build only, no publish)'
        required: false
        type: boolean
        default: false

# RC mode (added 2026-04-20 — see docs/guides/release-process.md):
#   - Appends `rc<N>` (PEP 440) to pyproject.toml version and `-rc.<N>` (SemVer)
#     to Cargo.toml version (maturin normalizes to PEP 440 for the wheel).
#   - `pip install totalreclaw-core` ignores the RC by default. Users opt in
#     with `pip install totalreclaw-core==2.1.0rc1`.
#   - Mutation is ephemeral; not committed back to main.

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }} ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply RC version suffix (rc mode only)
        if: inputs.release-type == 'rc'
        shell: bash
        run: |
          cd rust/totalreclaw-core
          python3 <<'PY'
          import re, pathlib
          rc_num = "${{ inputs.rc-number }}"
          for fname, strip_pat, suffix in [
              ('pyproject.toml', r'rc\d+$', f'rc{rc_num}'),
              ('Cargo.toml', r'-rc\.\d+$', f'-rc.{rc_num}'),
          ]:
              p = pathlib.Path(fname)
              text = p.read_text()
              def repl(m, _pat=strip_pat, _suf=suffix):
                  base = re.sub(_pat, '', m.group(2))
                  return f'{m.group(1)}"{base}{_suf}"'
              new_text = re.sub(
                  r'(^version\s*=\s*)"([^"]+)"',
                  repl,
                  text,
                  count=1,
                  flags=re.MULTILINE,
              )
              p.write_text(new_text)
              print(f"{fname} head:")
              print('\n'.join(new_text.splitlines()[:10]))
          PY

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/totalreclaw-core
          target: ${{ matrix.target }}
          args: --release --features python-extension --out dist -i python3.12
          manylinux: auto

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: rust/totalreclaw-core/dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Apply RC version suffix (rc mode only)
        if: inputs.release-type == 'rc'
        run: |
          cd rust/totalreclaw-core
          python3 <<'PY'
          import re, pathlib
          rc_num = "${{ inputs.rc-number }}"
          for fname, strip_pat, suffix in [
              ('pyproject.toml', r'rc\d+$', f'rc{rc_num}'),
              ('Cargo.toml', r'-rc\.\d+$', f'-rc.{rc_num}'),
          ]:
              p = pathlib.Path(fname)
              text = p.read_text()
              def repl(m, _pat=strip_pat, _suf=suffix):
                  base = re.sub(_pat, '', m.group(2))
                  return f'{m.group(1)}"{base}{_suf}"'
              new_text = re.sub(
                  r'(^version\s*=\s*)"([^"]+)"',
                  repl,
                  text,
                  count=1,
                  flags=re.MULTILINE,
              )
              p.write_text(new_text)
          PY

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/totalreclaw-core
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: rust/totalreclaw-core/dist/*.tar.gz

  wheel-surface-check:
    # Runtime backstop for issue #503: the source-level parity check in CI
    # (scripts/check-pyfunction-parity.py) guards decl<->registration at the
    # source level, but the thing that actually ships is the BUILT wheel. So
    # before publishing we install the freshly-built linux x86_64 wheel into a
    # clean venv and diff its real exported surface (dir(totalreclaw_core))
    # against the names derived from the source #[pyo3(name=...)] attrs +
    # #[pyclass] names. A registration that slipped through would drop a
    # function from the wheel -> this diff fails -> publish aborts. Sibling of
    # the Hermes rc10 incident (#427), one layer down. Runs on dry-run too so a
    # build-only dispatch still validates the surface. NOT in PR CI -- wheel
    # building belongs on the publish path (see #489/#491).
    name: Built-wheel surface check
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download built wheel (linux x86_64)
        uses: actions/download-artifact@v7
        with:
          name: wheels-ubuntu-latest-x86_64
          path: wheel-artifact

      - name: Install wheel into scratch venv
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install --upgrade pip
          /tmp/venv/bin/pip install wheel-artifact/totalreclaw_core-*.whl

      - name: Diff built-wheel surface vs source-derived expected exports
        run: |
          set -e
          # Expected surface: derived from source declarations (pyo3 name attrs
          # + pyclass names). A dropped registration does NOT shrink this list
          # (it is decl-derived), but it DOES shrink the built wheel -- which is
          # exactly the discrepancy this diff catches.
          python scripts/check-pyfunction-parity.py --expected-exports | sort > /tmp/expected.txt
          /tmp/venv/bin/python - <<'PY' | sort > /tmp/actual.txt
          import totalreclaw_core as m
          for n in sorted(n for n in dir(m) if not n.startswith('_')):
              print(n)
          PY
          echo "expected exports: $(wc -l < /tmp/expected.txt) | actual wheel surface: $(wc -l < /tmp/actual.txt)"
          /tmp/venv/bin/python - <<'PY'
          expected = sorted(l.strip() for l in open('/tmp/expected.txt') if l.strip())
          actual   = sorted(l.strip() for l in open('/tmp/actual.txt')   if l.strip())
          es, aset = set(expected), set(actual)
          missing = sorted(es - aset)   # declared but NOT in the built wheel
          extra   = sorted(aset - es)   # in the wheel but NOT declared (surprise)
          if missing:
              print('MISSING from built wheel (declared in source but not exported):')
              for n in missing: print('  - ' + n)
          if extra:
              print('UNEXPECTED exports in built wheel (not in source scan):')
              for n in extra: print('  - ' + n)
          if missing or extra:
              raise SystemExit(1)
          print('OK: built-wheel surface matches source-derived expected exports')
          PY

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist, wheel-surface-check]
    runs-on: ubuntu-latest
    if: inputs.dry-run == false
    permissions:
      id-token: write  # OIDC trusted publishing (no API token needed)
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
