name: Publish totalreclaw-core to PyPI

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'stable or rc (appends rc<N>; pip install ignores pre-release by default, users pin explicitly)'
        required: false
        type: choice
        options:
          - stable
          - rc
        default: stable
      rc-number:
        description: 'RC increment (1, 2, 3...) — only used when release-type=rc'
        required: false
        type: number
        default: 1
      dry-run:
        description: 'Dry run (build only, no publish)'
        required: false
        type: boolean
        default: false

# RC mode (added 2026-04-20 — see docs/guides/release-process.md):
#   - Appends `rc<N>` (PEP 440) to pyproject.toml version and `-rc.<N>` (SemVer)
#     to Cargo.toml version (maturin normalizes to PEP 440 for the wheel).
#   - `pip install totalreclaw-core` ignores the RC by default. Users opt in
#     with `pip install totalreclaw-core==2.1.0rc1`.
#   - Mutation is ephemeral; not committed back to main.

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }} ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply RC version suffix (rc mode only)
        if: inputs.release-type == 'rc'
        shell: bash
        run: |
          cd rust/totalreclaw-core
          python3 <<'PY'
          import re, pathlib
          rc_num = "${{ inputs.rc-number }}"
          for fname, strip_pat, suffix in [
              ('pyproject.toml', r'rc\d+$', f'rc{rc_num}'),
              ('Cargo.toml', r'-rc\.\d+$', f'-rc.{rc_num}'),
          ]:
              p = pathlib.Path(fname)
              text = p.read_text()
              def repl(m, _pat=strip_pat, _suf=suffix):
                  base = re.sub(_pat, '', m.group(2))
                  return f'{m.group(1)}"{base}{_suf}"'
              new_text = re.sub(
                  r'(^version\s*=\s*)"([^"]+)"',
                  repl,
                  text,
                  count=1,
                  flags=re.MULTILINE,
              )
              p.write_text(new_text)
              print(f"{fname} head:")
              print('\n'.join(new_text.splitlines()[:10]))
          PY

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/totalreclaw-core
          target: ${{ matrix.target }}
          args: --release --features python-extension --out dist -i python3.12
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: rust/totalreclaw-core/dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply RC version suffix (rc mode only)
        if: inputs.release-type == 'rc'
        run: |
          cd rust/totalreclaw-core
          python3 <<'PY'
          import re, pathlib
          rc_num = "${{ inputs.rc-number }}"
          for fname, strip_pat, suffix in [
              ('pyproject.toml', r'rc\d+$', f'rc{rc_num}'),
              ('Cargo.toml', r'-rc\.\d+$', f'-rc.{rc_num}'),
          ]:
              p = pathlib.Path(fname)
              text = p.read_text()
              def repl(m, _pat=strip_pat, _suf=suffix):
                  base = re.sub(_pat, '', m.group(2))
                  return f'{m.group(1)}"{base}{_suf}"'
              new_text = re.sub(
                  r'(^version\s*=\s*)"([^"]+)"',
                  repl,
                  text,
                  count=1,
                  flags=re.MULTILINE,
              )
              p.write_text(new_text)
          PY

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/totalreclaw-core
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: rust/totalreclaw-core/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: inputs.dry-run == false
    permissions:
      id-token: write  # OIDC trusted publishing (no API token needed)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
