name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  client-tests:
    name: Client Tests (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and test
        run: cd client && rm -f package-lock.json && npm install --legacy-peer-deps && npm test

  plugin-build:
    name: Plugin Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Plugin has no test script yet — just verify deps install cleanly
      - name: Install dependencies
        run: cd skill/plugin && npm ci --legacy-peer-deps

  mcp-tests:
    name: MCP Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: jetli/wasm-pack-action@v0.4.0
      - name: Build @totalreclaw/core (WASM)
        run: |
          cd rust/totalreclaw-core
          wasm-pack build --target nodejs --out-dir pkg --features wasm
          # wasm-pack emits package name "totalreclaw-core"; consumers expect "@totalreclaw/core"
          node -e "const p=require('./pkg/package.json'); p.name='@totalreclaw/core'; require('fs').writeFileSync('./pkg/package.json', JSON.stringify(p,null,2)+'\n')"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install, build, and test
        run: cd mcp && rm -f package-lock.json && npm install --legacy-peer-deps && npm run build && npm test

  rust-tests:
    name: Rust Core Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run tests
        run: cd rust/totalreclaw-core && cargo test

  python-tests:
    name: Python Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build totalreclaw_core wheel from local source
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/totalreclaw-core
          args: --release --features python-extension --out dist -i python3.12
      - name: Install local totalreclaw_core wheel
        run: pip install --force-reinstall rust/totalreclaw-core/dist/totalreclaw_core-*.whl
      - name: Install and test
        run: |
          cd python
          pip install -e ".[dev]"
          python -m pytest tests/ -v --ignore=tests/test_staging_integration.py --ignore=tests/cross_client_e2e.py --ignore=tests/test_cross_client.py -x

  # NOTE: Relay unit tests run in the private totalreclaw-relay repo CI.
  # This job runs the E2E smoke test against a real relay + PostgreSQL
  # using Docker Compose. Requires access to totalreclaw-relay repo.
