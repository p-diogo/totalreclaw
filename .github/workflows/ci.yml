name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  client-tests:
    name: Client Tests (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and test
        run: cd client && rm -f package-lock.json && npm install --legacy-peer-deps && npm test

  plugin-build:
    name: Plugin Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # We delete the lockfile because it was last regenerated against a local
      # `file:` dep for `@totalreclaw/core`; the current `package.json` uses
      # `^2.0.0` from npm and a fresh install resolves against the registry.
      # Once the lockfile is regenerated after `@totalreclaw/core@2.x` is
      # published, this can switch back to `npm ci`.
      - name: Install dependencies
        run: cd skill/plugin && rm -f package-lock.json && npm install --legacy-peer-deps

      # Simulate OpenClaw's `env-harvesting` scanner rule so a JSDoc comment
      # with "fetch" in a file that reads process.env never makes it to
      # ClawHub again. See docs/notes/INVESTIGATION-OPENCLAW-SCANNER-*.
      - name: Scanner-sim (env-harvesting false-positive check)
        run: node skill/scripts/check-scanner.mjs

      # Manifest shape regression guard (3.3.0-rc.6): asserts that
      # openclaw.plugin.json does NOT have "kind":"memory" (startup registry fix)
      # AND that index.ts still declares kind:'memory' as const (memory-slot
      # matching preserved). Uses npx tsx — available without a devDependency.
      # Includes import-time-smoke.test.ts (issue #110 fix 2) which asserts
      # plugin module load completes in <5s with no eager network I/O.
      - name: Plugin manifest shape + smoke tests
        run: cd skill/plugin && npm test

      # Issue #110 fix 1: build the plugin's TS to dist/.js, and verify the
      # tarball would ship a complete set of `.js` artifacts. PR-time check
      # so a broken build (e.g. missing import target, syntax error) doesn't
      # reach the publish workflow.
      - name: Build plugin (.ts -> dist/.js)
        run: cd skill/plugin && npm run build

      - name: Verify tarball ships built `.js` artifacts (issue #110)
        run: cd skill/plugin && npm run verify-tarball

      # Issue #124 (rc.20 ship-stopper): the published `dist/index.js` is
      # ESM-only (`"type":"module"`) but had three runtime `require()` calls
      # left over from an unfinished migration — every plugin entry point
      # died with `require is not defined`. The pre-publish gate above only
      # runs `node --check` (syntax-only) and missed it. This step actually
      # imports the built dist in a clean Node ESM process AND grep-guards
      # the dist files for any bare `require(` outside comments. Catches
      # the regression at PR time, never publish-time.
      - name: ESM-shape smoke (issue #124 — bare require regression)
        run: cd skill/plugin && npm run smoke:dist

  mcp-tests:
    name: MCP Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # NOTE: The `mcp` package now depends on `@totalreclaw/core@^2.0.0` from
      # npm (previously a `file:` dep against the local wasm-pack output). The
      # local WASM build below is now dead code — `npm install` resolves core
      # from the registry, never from the local `pkg/` directory. It is kept
      # transitionally so this job continues to green out on branches that
      # still carry the old `file:` dep. Once `@totalreclaw/core@2.x` is live
      # on npm AND no branch references the `file:` dep, the
      # `dtolnay/rust-toolchain`, `wasm-pack-action`, and
      # `Build @totalreclaw/core (WASM)` steps can be removed in a cleanup PR.
      - uses: dtolnay/rust-toolchain@stable
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.14.0'  # pinned to stop `latest`-tag flake; v0.9.1 lacks --features
      - name: Build @totalreclaw/core (WASM) [transitional — safe to drop once core@2.x is on npm]
        run: |
          cd rust/totalreclaw-core
          wasm-pack build --target nodejs --out-dir pkg --features wasm
          # wasm-pack emits package name "totalreclaw-core"; consumers expect "@totalreclaw/core"
          node -e "const p=require('./pkg/package.json'); p.name='@totalreclaw/core'; require('fs').writeFileSync('./pkg/package.json', JSON.stringify(p,null,2)+'\n')"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install, build, and test
        run: cd mcp && rm -f package-lock.json && npm install --legacy-peer-deps && npm run build && npm test

  rust-tests:
    name: Rust Core Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run tests
        run: cd rust/totalreclaw-core && cargo test

  python-tests:
    name: Python Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build totalreclaw_core wheel from local source
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/totalreclaw-core
          args: --release --features python-extension --out dist -i python3.12
      - name: Install local totalreclaw_core wheel
        run: pip install --force-reinstall rust/totalreclaw-core/dist/totalreclaw_core-*.whl
      - name: Install and test
        run: |
          cd python
          pip install -e ".[dev]"
          python -m pytest tests/ -v --ignore=tests/test_staging_integration.py --ignore=tests/cross_client_e2e.py --ignore=tests/test_cross_client.py -x

  # NOTE: Relay unit tests run in the private totalreclaw-relay repo CI.
  # This job runs the E2E smoke test against a real relay + PostgreSQL
  # using Docker Compose. Requires access to totalreclaw-relay repo.
  # Uncomment when relay repo is accessible from CI via RELAY_REPO_TOKEN secret.
