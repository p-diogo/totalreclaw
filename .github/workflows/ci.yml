name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  client-tests:
    name: Client Tests (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and test
        run: cd client && npm ci && npm test

  plugin-build:
    name: Plugin Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Plugin has no test script yet — just verify deps install cleanly
      - name: Install dependencies
        run: cd skill/plugin && npm ci
