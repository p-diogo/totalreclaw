name: Publish totalreclaw Python client to PyPI

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'stable or rc (appends rc<N>; pip install ignores pre-release by default, users pin explicitly)'
        required: false
        type: choice
        options:
          - stable
          - rc
        default: stable
      rc-number:
        description: 'RC increment (1, 2, 3...) — only used when release-type=rc'
        required: false
        type: number
        default: 1
      dry-run:
        description: 'Dry run (build only, no publish)'
        required: false
        type: boolean
        default: false

# RC mode (added 2026-04-20 — see docs/guides/release-process.md):
#   - Appends `rc<N>` (PEP 440) to python/pyproject.toml version.
#   - `pip install totalreclaw` ignores the RC by default. Users opt in with
#     `pip install totalreclaw==2.1.0rc1`.
#   - Mutation is ephemeral; not committed back to main.

jobs:
  build:
    name: Build Python package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Apply RC version suffix (rc mode only)
        if: inputs.release-type == 'rc'
        run: |
          cd python
          python3 <<'PY'
          import re, pathlib
          rc_num = "${{ inputs.rc-number }}"
          p = pathlib.Path('pyproject.toml')
          text = p.read_text()
          def repl(m):
              base = re.sub(r'rc\d+$', '', m.group(2))
              return f'{m.group(1)}"{base}rc{rc_num}"'
          new_text = re.sub(
              r'(^version\s*=\s*)"([^"]+)"',
              repl,
              text,
              count=1,
              flags=re.MULTILINE,
          )
          p.write_text(new_text)
          print("pyproject.toml head:")
          print('\n'.join(new_text.splitlines()[:10]))
          PY

      - name: Build sdist and wheel
        run: cd python && python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/*

  test:
    name: Test package
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build totalreclaw_core wheel from local source
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/totalreclaw-core
          args: --release --features python-extension --out dist -i python3.12

      - name: Install local totalreclaw_core wheel
        run: pip install --force-reinstall rust/totalreclaw-core/dist/totalreclaw_core-*.whl

      - name: Install and test
        run: |
          cd python
          pip install -e ".[dev]"
          python -m pytest tests/ -v \
            --ignore=tests/test_staging_integration.py \
            --ignore=tests/cross_client_e2e.py \
            --ignore=tests/test_cross_client.py \
            --ignore=tests/test_embedding.py \
            --ignore=tests/test_userop.py \
            -x

  publish:
    name: Publish to PyPI
    needs: [build, test]
    runs-on: ubuntu-latest
    if: inputs.dry-run == false
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          attestations: false
