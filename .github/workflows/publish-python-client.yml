name: Publish totalreclaw Python client to PyPI

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'stable or rc (appends rc<N>; pip install ignores pre-release by default, users pin explicitly)'
        required: false
        type: choice
        options:
          - stable
          - rc
        default: stable
      rc-number:
        description: 'RC increment (1, 2, 3...) — only used when release-type=rc'
        required: false
        type: number
        default: 1
      dry-run:
        description: 'Dry run (build only, no publish)'
        required: false
        type: boolean
        default: false

# RC mode (added 2026-04-20 — see docs/guides/release-process.md):
#   - Appends `rc<N>` (PEP 440) to python/pyproject.toml version.
#   - `pip install totalreclaw` ignores the RC by default. Users opt in with
#     `pip install totalreclaw==2.1.0rc1`.
#   - Mutation is ephemeral; not committed back to main.
#
# Environment-binding rule (post-F-flip, 2.3.12-rc.1):
#   - BOTH stable and RC wheels default to PRODUCTION
#     (``api.totalreclaw.xyz``). No publish-time URL rewrite is needed —
#     the canonical default-URL site at ``_HARDCODED_DEFAULT_URL`` in
#     ``python/src/totalreclaw/relay.py`` already binds to production.
#   - Staging access is opt-in via
#     ``TOTALRECLAW_SERVER_URL=https://api-staging.totalreclaw.xyz`` at
#     runtime. The rule only changes the default.
#   - A pre-publish CI guard fails the build if any wheel still contains
#     ``api-staging`` (stranded staging defaults are forbidden).

jobs:
  build:
    name: Build Python package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Apply RC version suffix (rc mode only)
        if: inputs.release-type == 'rc'
        run: |
          cd python
          python3 <<'PY'
          import re, pathlib
          rc_num = "${{ inputs.rc-number }}"
          p = pathlib.Path('pyproject.toml')
          text = p.read_text()
          def repl(m):
              base = re.sub(r'rc\d+$', '', m.group(2))
              return f'{m.group(1)}"{base}rc{rc_num}"'
          new_text = re.sub(
              r'(^version\s*=\s*)"([^"]+)"',
              repl,
              text,
              count=1,
              flags=re.MULTILINE,
          )
          p.write_text(new_text)
          print("pyproject.toml head:")
          print('\n'.join(new_text.splitlines()[:10]))
          PY

      # Sync SKILL.md frontmatter `version:` field to the (post-mutation)
      # pyproject.toml version. Issue #352: rc.2.4.4rc2 shipped with
      # SKILL.md `version: 2.3.1rc10` because the field was hardcoded in
      # source and the publish workflow only mutated pyproject.toml.
      # Agents load SKILL.md from the installed package — a stale version
      # there causes them to follow an old install script that diverges
      # from the current setup guide. Mirroring the pyproject mutation
      # here closes that drift structurally.
      - name: Sync SKILL.md version field to pyproject.toml version
        run: |
          python3 <<'PY'
          import re, pathlib
          pyproject = pathlib.Path('python/pyproject.toml').read_text()
          m = re.search(r'^version\s*=\s*"([^"]+)"', pyproject, flags=re.MULTILINE)
          if not m:
              raise SystemExit("pyproject.toml version line not found")
          target_version = m.group(1)
          skill = pathlib.Path('python/src/totalreclaw/hermes/SKILL.md')
          text = skill.read_text()
          new_text, n = re.subn(
              r'(^version:\s*).*$',
              lambda mm: f'{mm.group(1)}{target_version}',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          if n != 1:
              raise SystemExit("SKILL.md frontmatter `version:` line not found")
          skill.write_text(new_text)
          print(f"SKILL.md version field synced to {target_version}")
          print('\n'.join(new_text.splitlines()[:8]))
          PY

      # 2.3.12-rc.1 (F flip): no URL rewrite needed — the source at
      # `_HARDCODED_DEFAULT_URL` already binds to production for both
      # release types.

      - name: Build sdist and wheel
        run: cd python && python -m build

      # 2.3.12-rc.1 (F flip) pre-publish CI guard. Both stable and RC
      # wheels MUST default to production. Any stranded ``api-staging``
      # literal is a release-blocker.
      - name: Verify wheel default-URL binding (post-F-flip — production for both)
        run: |
          cd python
          set -euo pipefail
          rm -rf /tmp/wheel-check
          mkdir -p /tmp/wheel-check
          for whl in dist/*.whl; do
            python -m zipfile -e "$whl" /tmp/wheel-check/
          done
          echo "Scanning extracted wheel for URL literals..."
          default_url_line=$(grep -RIn '^_HARDCODED_DEFAULT_URL\s*=' /tmp/wheel-check/ --include='*.py' || true)
          echo "Canonical default-URL line: ${default_url_line:-<not-found>}"
          if [ -z "$default_url_line" ]; then
            echo "::error::Canonical _HARDCODED_DEFAULT_URL line not found in wheel."
            exit 1
          fi
          if echo "$default_url_line" | grep -q "api-staging\.totalreclaw\.xyz"; then
            echo "::error::Wheel default-URL still binds to staging. Both stable and RC must default to production."
            exit 1
          fi
          if ! echo "$default_url_line" | grep -q "https://api\.totalreclaw\.xyz"; then
            echo "::error::Wheel default-URL is neither staging nor production. Inspect the line above."
            exit 1
          fi
          echo "OK (${{ inputs.release-type }}): wheel binds to production by default."

      - uses: actions/upload-artifact@v6
        with:
          name: python-dist
          path: python/dist/*

  test:
    name: Test package
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build totalreclaw_core wheel from local source
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/totalreclaw-core
          args: --release --features python-extension --out dist -i python3.12

      - name: Install local totalreclaw_core wheel
        run: pip install --force-reinstall rust/totalreclaw-core/dist/totalreclaw_core-*.whl

      - name: Install and test
        run: |
          cd python
          pip install -e ".[dev]"
          python -m pytest tests/ -v \
            --ignore=tests/test_staging_integration.py \
            --ignore=tests/cross_client_e2e.py \
            --ignore=tests/test_cross_client.py \
            --ignore=tests/test_embedding.py \
            --ignore=tests/test_userop.py \
            -x

  publish:
    name: Publish to PyPI
    needs: [build, test]
    runs-on: ubuntu-latest
    if: inputs.dry-run == false
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          attestations: false
