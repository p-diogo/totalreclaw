name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      crate:
        description: 'Crate to publish'
        required: true
        type: choice
        options:
          - totalreclaw-core
          - totalreclaw-memory
          - all
        default: all
      release-type:
        description: 'stable or rc (appends -rc.<N>; cargo treats as pre-release, users pin explicitly)'
        required: false
        type: choice
        options:
          - stable
          - rc
        default: stable
      rc-number:
        description: 'RC increment (1, 2, 3...) — only used when release-type=rc'
        required: false
        type: number
        default: 1
      dry-run:
        description: 'Dry run (package only, no publish)'
        required: false
        type: boolean
        default: false

# Publish order matters: totalreclaw-memory depends on totalreclaw-core, so core must
# exist on crates.io before memory is published. The two jobs below encode that ordering.
#
# RC mode (`release-type: rc`, added 2026-04-20 — see docs/guides/release-process.md):
#   - Core: Cargo.toml `version` gets `-rc.<N>` appended in-workflow (not committed).
#   - Memory: Cargo.toml `version` gets `-rc.<N>` appended AND the `totalreclaw-core`
#     dep's `version = "2.0"` field is rewritten to the exact RC version string,
#     otherwise cargo's pre-release semver rule will refuse to resolve the dep.
#   - Users opt into RC explicitly with `cargo add totalreclaw-core@=2.1.0-rc.1`
#     or a `[dependencies] totalreclaw-core = "=2.1.0-rc.1"` entry.
#   - `cargo install --version` also works. No dist-tag on crates.io (unlike npm),
#     so "pre-release" is purely semver semantics.

jobs:
  publish-core:
    if: >
      github.event_name == 'push' ||
      inputs.crate == 'totalreclaw-core' ||
      inputs.crate == 'all'
    name: Publish totalreclaw-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/totalreclaw-core/target
          key: ${{ runner.os }}-cargo-core-${{ hashFiles('rust/totalreclaw-core/Cargo.lock') }}

      - name: Apply RC version suffix (rc mode only)
        if: inputs.release-type == 'rc'
        run: |
          cd rust/totalreclaw-core
          # Rewrite Cargo.toml in place: strip any existing -rc.<N>, append fresh.
          # This is ephemeral to the workflow run; we do NOT commit it.
          python3 <<'PY'
          import re, pathlib
          p = pathlib.Path('Cargo.toml')
          text = p.read_text()
          rc_num = "${{ inputs.rc-number }}"
          def repl(m):
              base = re.sub(r'-rc\.\d+$', '', m.group(2))
              return f'{m.group(1)}"{base}-rc.{rc_num}"'
          new_text = re.sub(
              r'(^version\s*=\s*)"([^"]+)"',
              repl,
              text,
              count=1,
              flags=re.MULTILINE,
          )
          p.write_text(new_text)
          print(new_text.splitlines()[:10])
          PY

      - name: Report version
        id: version
        run: |
          cd rust/totalreclaw-core
          VERSION=$(cargo metadata --format-version 1 --no-deps | python3 -c "import sys,json; d=json.load(sys.stdin); print(next(p['version'] for p in d['packages'] if p['name']=='totalreclaw-core'))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing totalreclaw-core@$VERSION"

      - name: Cargo package (dry-run sanity check)
        run: cd rust/totalreclaw-core && cargo package --allow-dirty

      - name: Publish
        if: >
          github.event_name == 'push' ||
          inputs.dry-run == false
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          cd rust/totalreclaw-core
          VERSION="${{ steps.version.outputs.version }}"
          # Tolerate "already uploaded" — publish is idempotent per version
          set +e
          OUT=$(cargo publish --allow-dirty 2>&1)
          CODE=$?
          set -e
          echo "$OUT"
          if [ $CODE -eq 0 ]; then
            echo "Published totalreclaw-core@$VERSION"
          elif echo "$OUT" | grep -qE "(already uploaded|already exists|crate version .* is already uploaded)"; then
            echo "totalreclaw-core@$VERSION already published, continuing"
          else
            exit $CODE
          fi

  publish-memory:
    needs: [publish-core]
    if: >
      always() &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped') &&
      (
        github.event_name == 'push' ||
        inputs.crate == 'totalreclaw-memory' ||
        inputs.crate == 'all'
      )
    name: Publish totalreclaw-memory
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/totalreclaw-memory/target
          key: ${{ runner.os }}-cargo-memory-${{ hashFiles('rust/totalreclaw-memory/Cargo.lock') }}

      - name: Apply RC version suffix + pin core dep to RC (rc mode only)
        if: inputs.release-type == 'rc'
        run: |
          # Bump memory's own version AND rewrite its `totalreclaw-core` dep
          # from `version = "2.0"` to the exact `-rc.<N>` string, because
          # cargo's semver pre-release rule refuses to resolve `"2.0"` against
          # a pre-release like `2.1.0-rc.1`. We read the RC'd core version
          # straight from core's Cargo.toml (same workflow run mutated it).
          python3 <<'PY'
          import re, pathlib
          rc_num = "${{ inputs.rc-number }}"

          # Read the core version that the publish-core job just set.
          core_toml = pathlib.Path('rust/totalreclaw-core/Cargo.toml').read_text()
          core_version_m = re.search(r'^version\s*=\s*"([^"]+)"', core_toml, re.MULTILINE)
          core_version = core_version_m.group(1)
          print(f"core @ {core_version}")

          # Mutate memory's own version.
          mem_path = pathlib.Path('rust/totalreclaw-memory/Cargo.toml')
          mem_text = mem_path.read_text()
          def mem_version_repl(m):
              base = re.sub(r'-rc\.\d+$', '', m.group(2))
              return f'{m.group(1)}"{base}-rc.{rc_num}"'
          mem_text = re.sub(
              r'(^version\s*=\s*)"([^"]+)"',
              mem_version_repl,
              mem_text,
              count=1,
              flags=re.MULTILINE,
          )

          # Rewrite the core dep line so its `version = "…"` points at the RC.
          # Match: totalreclaw-core = { path = "…", version = "2.0" }
          mem_text = re.sub(
              r'(totalreclaw-core\s*=\s*\{[^}]*version\s*=\s*)"[^"]+"',
              rf'\1"={core_version}"',
              mem_text,
          )
          mem_path.write_text(mem_text)
          print("memory Cargo.toml head:")
          print('\n'.join(mem_text.splitlines()[:20]))
          PY

      - name: Wait for core to be queryable on crates.io
        if: needs.publish-core.result == 'success'
        run: |
          # crates.io index propagation can take a few seconds after publish.
          # Poll until the version we depend on shows up (or bail after ~2 min).
          CORE_VERSION=$(python3 -c "import tomllib,sys; d=tomllib.load(open('rust/totalreclaw-core/Cargo.toml','rb')); print(d['package']['version'])")
          echo "Waiting for totalreclaw-core@$CORE_VERSION on crates.io..."
          for i in $(seq 1 24); do
            if curl -sSf "https://crates.io/api/v1/crates/totalreclaw-core/$CORE_VERSION" >/dev/null 2>&1; then
              echo "totalreclaw-core@$CORE_VERSION is live"
              exit 0
            fi
            echo "Not yet (attempt $i/24), sleeping 5s..."
            sleep 5
          done
          echo "Timed out waiting for crates.io propagation"
          exit 1

      - name: Report version
        id: version
        run: |
          cd rust/totalreclaw-memory
          VERSION=$(cargo metadata --format-version 1 --no-deps | python3 -c "import sys,json; d=json.load(sys.stdin); print(next(p['version'] for p in d['packages'] if p['name']=='totalreclaw-memory'))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing totalreclaw-memory@$VERSION"

      - name: Cargo package (dry-run sanity check)
        run: cd rust/totalreclaw-memory && cargo package --allow-dirty

      - name: Publish
        if: >
          github.event_name == 'push' ||
          inputs.dry-run == false
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          cd rust/totalreclaw-memory
          VERSION="${{ steps.version.outputs.version }}"
          set +e
          OUT=$(cargo publish --allow-dirty 2>&1)
          CODE=$?
          set -e
          echo "$OUT"
          if [ $CODE -eq 0 ]; then
            echo "Published totalreclaw-memory@$VERSION"
          elif echo "$OUT" | grep -qE "(already uploaded|already exists|crate version .* is already uploaded)"; then
            echo "totalreclaw-memory@$VERSION already published, continuing"
          else
            exit $CODE
          fi
