# Publish to ClawHub on version tag push or manual dispatch.
#
# Setup:
#   1. Get your ClawHub token:
#        clawhub login          # opens browser, stores token locally
#        cat ~/.config/clawhub/config.json   # copy the token value
#   2. Add repository secrets in GitHub (Settings > Secrets > Actions):
#        CLAWHUB_TOKEN       - ClawHub API token (required)
#        TELEGRAM_BOT_TOKEN  - Telegram bot token (optional, for notifications)
#        TELEGRAM_CHAT_ID    - Telegram chat ID (optional, for notifications)
#   3. Trigger:
#        git tag v1.5.0 && git push --tags   # auto-publishes
#        or use "Run workflow" button in GitHub Actions (manual dispatch)
#
# RC mode (`release-type: rc`, added 2026-04-20 — see
# docs/guides/release-process.md): ClawHub CLI v0.9.0 `publish` has no
# dedicated pre-release channel. We simulate one by:
#   1. Appending `-rc.<N>` to the published version (SemVer pre-release),
#   2. Tagging the release with `rc` (and omitting `latest` from the tag list)
#      so the ClawHub UI/search does not surface it as the current version,
#   3. Documenting the opt-in install path for QA:
#        clawhub install totalreclaw --version 3.1.0-rc.1
# Stable promotion (via `promote-rc.yml`) republishes the same content at
# the stable version with the full `latest,memory,encryption,...` tag set.

name: Publish to ClawHub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.4.0). For RC, provide the BASE version; `-rc.<N>` is appended automatically.'
        required: true
      release-type:
        description: 'stable (tag `latest`) or rc (append -rc.<N>, tag `rc` only)'
        required: false
        type: choice
        options:
          - stable
          - rc
        default: stable
      rc-number:
        description: 'RC increment (1, 2, 3...) — only used when release-type=rc'
        required: false
        type: number
        default: 1
      slug:
        description: 'ClawHub slug (default: totalreclaw). Override for canary / preview / side-channel publishes.'
        required: false
        type: string
        default: totalreclaw

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # `write` so the post-publish step can `git push origin v<VERSION>` (rc.21 finding #8)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Block the publish if any plugin file would trip OpenClaw's
      # `env-harvesting` scanner rule. Cheaper to fail here than to ship a
      # broken plugin to ClawHub and have new users hit "installation blocked"
      # on `openclaw plugins install ~/.openclaw/workspace/skills/totalreclaw`.
      # See docs/notes/INVESTIGATION-OPENCLAW-SCANNER-*.
      - name: Scanner-sim (env-harvesting false-positive check)
        run: node skill/scripts/check-scanner.mjs

      # Issue #110 fix 1: build the plugin's TS to dist/.js before publish.
      # The plugin uses ` /* */ from './X.js'` Node-ESM-style imports; the
      # tarball must ship matching dist/X.js files, otherwise CLI subcommand
      # paths fail (gateway TS-loader was masking this on the runtime path).
      - name: Install plugin dependencies (for tsc)
        run: cd skill/plugin && rm -f package-lock.json && npm install --legacy-peer-deps

      - name: Build plugin (.ts -> dist/.js)
        run: cd skill/plugin && npm run build

      - name: Verify tarball ships built `.js` artifacts (issue #110)
        run: cd skill/plugin && npm run verify-tarball

      - name: Install ClawHub CLI (pinned to 0.8.0)
        # Pin to 0.8.0 because 0.9.x renamed plugin-publish to
        # `clawhub package publish` AND the new code-plugin family collides
        # with the existing `totalreclaw` slug already registered as Family=Skill
        # (rc.22 era). Until the slug is migrated upstream OR we accept a
        # rename-with-redirect, 0.8.x's legacy `clawhub publish --slug` is the
        # only working path. See https://github.com/p-diogo/totalreclaw-internal/issues/189
        run: npm install -g clawhub@0.8.0

      # ROOT CAUSE of rc.21 finding #3 (on-disk version drift): this
      # workflow used to call `clawhub publish ./skill/plugin` WITHOUT
      # ever mutating package.json / SKILL.md / skill.json in the
      # working tree. So even when `--version` was set to the right RC
      # string in the catalog, the tarball ClawHub built from
      # `./skill/plugin/` shipped whatever was checked into main —
      # which was a stale 3.3.1-rc.15 in package.json + 3.3.1-rc.11 in
      # SKILL.md + 1.6.2 in skill.json. New users installing rc.21 got
      # rc.15-on-disk, no matter what the catalog said.
      #
      # Fix: resolve the publish version, write it into all three
      # bundled files BEFORE `clawhub publish`, then run the drift
      # gate so a sync regression is impossible.
      - name: Resolve version + propagate to bundled tarball files
        id: resolve
        run: |
          set -e
          BASE_VERSION="${{ github.event.inputs.version || github.ref_name }}"
          BASE_VERSION="${BASE_VERSION#v}"                 # Strip 'v' prefix if present
          BASE_VERSION="${BASE_VERSION%-rc.*}"             # Strip any existing -rc.<N>

          RELEASE_TYPE="${{ github.event.inputs.release-type }}"
          RC_NUMBER="${{ github.event.inputs.rc-number }}"
          RELEASE_TYPE="${RELEASE_TYPE:-stable}"

          if [ "$RELEASE_TYPE" = "rc" ]; then
            VERSION="${BASE_VERSION}-rc.${RC_NUMBER}"
          else
            VERSION="$BASE_VERSION"
          fi

          # Mutate skill/plugin/package.json::version in-place. Same shape
          # as the npm-publish.yml RC suffix step — keeps the canonical
          # source of truth in one place.
          node -e "
          const fs = require('fs');
          const p = require('./skill/plugin/package.json');
          p.version = '${VERSION}';
          fs.writeFileSync('./skill/plugin/package.json', JSON.stringify(p, null, 2) + '\n');
          console.log('package.json::version =', p.version);
          "

          # Propagate into SKILL.md frontmatter + skill.json, then GATE.
          node skill/scripts/sync-version.mjs
          node skill/scripts/check-version-drift.mjs

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_type=${RELEASE_TYPE}" >> "$GITHUB_OUTPUT"

      # 3.3.3-rc.1 (PR #165 implementation): bind stable artifacts to
      # production, leave RC artifacts on staging. Mirrors the npm-publish.yml
      # "Bind stable artifacts to production URLs" + "Stable / RC URL guard"
      # steps. ClawHub publishes the source tree (with built dist/) opaquely,
      # so the same sed needs to run before `clawhub publish`.
      - name: Bind stable artifacts to production URLs (release-type=stable)
        if: steps.resolve.outputs.release_type == 'stable'
        run: |
          cd skill/plugin
          FILES=$(find dist -type f \( -name '*.js' -o -name '*.d.ts' -o -name '*.cjs' -o -name '*.mjs' \) 2>/dev/null)
          FILES="${FILES} skill.json SKILL.md CHANGELOG.md CLAWHUB.md README.md"
          for f in $FILES; do
            [ -f "$f" ] || continue
            sed -i.bak 's|api-staging\.totalreclaw\.xyz|api.totalreclaw.xyz|g' "$f"
            rm -f "$f.bak"
          done
          if grep -rqF 'api-staging.totalreclaw.xyz' dist/ skill.json 2>/dev/null; then
            echo "ERROR: api-staging.totalreclaw.xyz still present in stable artifact"
            grep -rnF 'api-staging.totalreclaw.xyz' dist/ skill.json
            exit 1
          fi
          echo "Stable URL bind complete."

      - name: Stable / RC URL guard (env-binding rule per PR #165)
        run: |
          cd skill/plugin
          MODE="${{ steps.resolve.outputs.release_type }}"
          if [ "$MODE" = "stable" ]; then
            if grep -rqF 'api-staging.totalreclaw.xyz' dist/ skill.json 2>/dev/null; then
              echo "GUARD FAIL: stable artifact contains api-staging.totalreclaw.xyz"
              exit 1
            fi
            if ! grep -rqF 'api.totalreclaw.xyz' dist/ skill.json 2>/dev/null; then
              echo "GUARD FAIL: stable artifact missing api.totalreclaw.xyz reference"
              exit 1
            fi
            echo "GUARD OK: stable artifact bound to api.totalreclaw.xyz"
          else
            if ! grep -rqF 'api-staging.totalreclaw.xyz' dist/ skill.json 2>/dev/null; then
              echo "GUARD FAIL: RC artifact missing api-staging.totalreclaw.xyz default"
              exit 1
            fi
            echo "GUARD OK: RC artifact retains api-staging.totalreclaw.xyz default"
          fi

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          set -e
          VERSION="${{ steps.resolve.outputs.version }}"
          RELEASE_TYPE="${{ steps.resolve.outputs.release_type }}"

          if [ "$RELEASE_TYPE" = "rc" ]; then
            # `rc`-only tags; do NOT set `latest` so the ClawHub front page
            # keeps pointing at the last stable version until promote-rc
            # republishes the same content as `latest`.
            TAGS="rc"
            CHANGELOG="Release candidate $VERSION -- testing build, not recommended for production. See https://github.com/p-diogo/totalreclaw/releases"
          else
            TAGS="latest,memory,encryption,e2ee,privacy,agent-memory,e2e-encryption,persistent-context"
            CHANGELOG="Release $VERSION -- see https://github.com/p-diogo/totalreclaw/releases/tag/v$VERSION"
          fi

          echo "Publishing to ClawHub: version=$VERSION tags=$TAGS"

          SLUG="${{ github.event.inputs.slug }}"
          SLUG="${SLUG:-totalreclaw}"
          echo "Publishing to slug: $SLUG"

          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          # Using legacy `clawhub publish --slug` (CLI 0.8.0). 0.9.x's
          # `clawhub package publish --family code-plugin` would collide with
          # the existing `totalreclaw` slug already registered Family=Skill.
          # See install step above for full context.
          clawhub publish ./skill/plugin \
            --slug "$SLUG" \
            --version "$VERSION" \
            --tags "$TAGS" \
            --changelog "$CHANGELOG"

          # Surface the published version for downstream jobs / notifications.
          echo "published_version=$VERSION" >> "$GITHUB_OUTPUT"
        id: publish

      # Idempotent git-tag of the source SHA the ClawHub publish came
      # from. Same logic as npm-publish.yml so manual dispatches that
      # only hit ClawHub still tag history. Closes rc.21 finding #8
      # (no v3.3.1-rc.* tags in public repo).
      - name: Tag git commit with published version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.publish.outputs.published_version }}"
          TAG="v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}$"; then
            echo "Tag ${TAG} already exists on origin, skipping"
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git tag "${TAG}"
          git push origin "${TAG}"
          echo "Tagged: ${TAG}"

      - name: Notify on Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured, skipping notification"
            exit 0
          fi
          VERSION="${{ steps.publish.outputs.published_version }}"
          RELEASE_TYPE="${{ github.event.inputs.release-type }}"
          RELEASE_TYPE="${RELEASE_TYPE:-stable}"
          if [ "$RELEASE_TYPE" = "rc" ]; then
            MSG="TotalReclaw v${VERSION} (RC) published to ClawHub"
          else
            MSG="TotalReclaw v${VERSION} published to ClawHub"
          fi
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=HTML" || true
