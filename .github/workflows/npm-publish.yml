name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - core
          - mcp-server
          - client
          - all
      dry-run:
        description: 'Dry run (build only, no publish)'
        required: false
        type: boolean
        default: false

jobs:
  publish-core:
    if: inputs.package == 'core' || inputs.package == 'all'
    name: Publish @totalreclaw/core (WASM)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: jetli/wasm-pack-action@v0.4.0

      - name: Build WASM
        run: cd rust/totalreclaw-core && wasm-pack build --target nodejs --out-dir pkg --features wasm

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish
        if: inputs.dry-run == false
        run: cd rust/totalreclaw-core/pkg && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Report version
        run: |
          node -e "const p = require('./rust/totalreclaw-core/pkg/package.json'); console.log('Published:', p.name + '@' + p.version)"

  publish-client:
    needs: [publish-core]
    if: |
      always() &&
      (inputs.package == 'client' || inputs.package == 'all') &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    name: Publish @totalreclaw/client
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: cd client && npm ci --legacy-peer-deps

      - name: Build
        run: cd client && npm run build

      - name: Run tests
        run: cd client && npm test

      - name: Publish
        if: inputs.dry-run == false
        run: cd client && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Report version
        run: |
          node -e "const p = require('./client/package.json'); console.log('Published:', p.name + '@' + p.version)"

  publish-mcp-server:
    needs: [publish-core]
    if: |
      always() &&
      (inputs.package == 'mcp-server' || inputs.package == 'all') &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    name: Publish @totalreclaw/mcp-server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: cd mcp && npm ci

      - name: Build
        run: cd mcp && npm run build

      - name: Run tests
        run: cd mcp && npm test

      - name: Publish
        if: inputs.dry-run == false
        run: cd mcp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Report version
        run: |
          node -e "const p = require('./mcp/package.json'); console.log('Published:', p.name + '@' + p.version)"
