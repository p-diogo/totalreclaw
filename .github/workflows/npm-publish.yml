name: Publish npm packages

# The `publish-plugin` job was added 2026-04-19 to fix an install bug on
# OpenClaw CLI 2026.4.2+: `openclaw plugins install @totalreclaw/totalreclaw`
# fell through to npm and fetched a stale 1.6.0 tarball (last published
# pre-centralization work), which tripped the CLI's `env-harvesting`
# scanner and blocked install. Plugin had only ever shipped to ClawHub.
# Publishing the current 3.0.x plugin to npm restores the documented
# one-liner install path. See PR https://github.com/p-diogo/totalreclaw/pull/
# (the PR that introduced this comment) for full write-up.
#
# `release-type` input was added 2026-04-20 for the RC (release-candidate)
# publish flow — see docs/guides/release-process.md. `stable` keeps the
# default `latest` dist-tag + version-as-in-package.json. `rc` appends
# `-rc.<N>` to the version, publishes to the `rc` dist-tag, and does NOT
# touch the checked-in package.json (version bump is in-workflow only).

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - core
          - mcp-server
          - client
          - nanoclaw
          - plugin
          - all
      release-type:
        description: 'stable (latest dist-tag) or rc (pre-release, rc dist-tag)'
        required: false
        type: choice
        options:
          - stable
          - rc
        default: stable
      rc-number:
        description: 'RC increment (1, 2, 3...) — only used when release-type=rc'
        required: false
        type: number
        default: 1
      dry-run:
        description: 'Dry run (build only, no publish)'
        required: false
        type: boolean
        default: false

jobs:
  publish-core:
    if: inputs.package == 'core' || inputs.package == 'all'
    name: Publish @totalreclaw/core (WASM)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.14.0'  # pinned to stop `latest`-tag flake; v0.9.1 lacks --features

      - name: Build WASM (nodejs target — bare `@totalreclaw/core` specifier)
        run: cd rust/totalreclaw-core && wasm-pack build --target nodejs --out-dir pkg/nodejs --features wasm

      - name: Build WASM (web target — `@totalreclaw/core/web` subpath, #500)
        # Same crate, same version, built a second time with a different
        # wasm-bindgen glue target. The compiled .wasm is byte-identical to
        # the nodejs build (verified locally: only the JS wrapper differs;
        # `wasm-pack --target` does not affect the wasm-opt output). This
        # gives the vault SPA a browser-safe entry (no `require`/`fs`) with
        # structural byte-parity to the published nodejs artifact plugin/
        # mcp/python already depend on — not a separately-built, unverifiable
        # binary (see totalreclaw#500).
        run: cd rust/totalreclaw-core && wasm-pack build --target web --out-dir pkg/web --features wasm

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Compose pkg/package.json (nodejs + web subpath export)
        # wasm-pack emits a separate package.json per --out-dir, each named
        # the unscoped "totalreclaw-core". Compose ONE root manifest with an
        # `exports` map: `.` stays the nodejs build (byte-for-byte unchanged
        # for existing plugin/mcp/nanoclaw consumers — no breaking change),
        # `./web` is the new browser-safe build for the vault SPA.
        run: |
          cd rust/totalreclaw-core/pkg
          node -e "
          const fs = require('fs');
          const nodejsPkg = JSON.parse(fs.readFileSync('./nodejs/package.json', 'utf8'));

          const composed = {
            name: '@totalreclaw/core',
            description: nodejsPkg.description,
            version: nodejsPkg.version,
            license: nodejsPkg.license,
            repository: nodejsPkg.repository,
            homepage: nodejsPkg.homepage,
            keywords: nodejsPkg.keywords,
            files: ['nodejs/**', 'web/**'],
            main: './nodejs/totalreclaw_core.js',
            types: './nodejs/totalreclaw_core.d.ts',
            exports: {
              '.': {
                types: './nodejs/totalreclaw_core.d.ts',
                default: './nodejs/totalreclaw_core.js'
              },
              './web': {
                types: './web/totalreclaw_core.d.ts',
                default: './web/totalreclaw_core.js'
              }
            }
          };

          fs.writeFileSync('./package.json', JSON.stringify(composed, null, 2) + '\n');
          // Only the composed root manifest above governs resolution + npm
          // packing — drop the per-target manifest wasm-pack generated.
          fs.rmSync('./nodejs/package.json');
          // The web build's glue file uses ESM 'export' syntax. Without a
          // 'type' field on the nearest package.json, Node has to sniff the
          // file (MODULE_TYPELESS_PACKAGE_JSON perf-overhead warning). Give
          // it a minimal directory-scoped marker instead of a full manifest
          // (the root manifest can't declare 'type: module' itself — the
          // nodejs build's glue file is CommonJS and must stay the default
          // type for the existing '.' export to resolve correctly).
          fs.writeFileSync('./web/package.json', JSON.stringify({ type: 'module' }, null, 2) + '\n');
          // wasm-pack also drops a per-target '.gitignore' containing a bare
          // '*'. npm's packer respects nested .gitignore/.npmignore files
          // even with an explicit root 'files' field, so left in place these
          // silently exclude both target dirs from the published tarball
          // (verified locally: a 'files'-only compose with the .gitignores
          // still present produced a 1-file tarball — package.json alone).
          fs.rmSync('./nodejs/.gitignore', { force: true });
          fs.rmSync('./web/.gitignore', { force: true });
          "
          echo "Package name: $(node -e "console.log(require('./package.json').name)")"
          echo "Version: $(node -e "console.log(require('./package.json').version)")"

      - name: Apply RC version suffix (rc mode only)
        if: inputs.release-type == 'rc'
        run: |
          cd rust/totalreclaw-core/pkg
          # RC mode: append -rc.<N> to the version in pkg/package.json.
          # This tree is ephemeral (generated by wasm-pack), so we're not
          # mutating anything checked into the repo.
          node -e "
          const fs = require('fs');
          const p = require('./package.json');
          const base = p.version.split('-')[0];
          p.version = base + '-rc.${{ inputs.rc-number }}';
          fs.writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
          console.log('RC version:', p.version);
          "

      - name: Guard — refuse to republish an existing version
        if: inputs.dry-run == false
        # #456: an omitted `rc-number` silently defaulted to 1, republished
        # an already-existing rc.1, and the "tolerate already published"
        # catch in the Publish step below let the job conclude success. Fail
        # BEFORE we ever attempt the publish so a stale/duplicate version is
        # loud, not a silent no-op.
        run: |
          cd rust/totalreclaw-core/pkg
          NAME=$(node -e "console.log(require('./package.json').name)")
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "ERROR: $NAME@$VERSION already published — refusing to republish (bump the version or rc-number)."
            exit 1
          fi
          echo "OK: $NAME@$VERSION not yet published, proceeding"

      - name: Upgrade npm to latest (required for tokenless OIDC publish)
        if: inputs.dry-run == false
        # npm 10.x (Node 22) signs provenance with OIDC but still PUTs with a
        # legacy token → E404 after NPM_TOKEN expired (the 2026-06-07 core run).
        # Tokenless OIDC (the OIDC token IS the auth) needs npm >= 11.5.1.
        run: |
          # Pinned to npm@11 — npm 12.0.0 (latest as of 2026-07-09) ships a broken
          # --provenance path (Cannot find module 'sigstore'). 11.x publishes fine.
          npm install -g npm@11
          npm --version

      - name: Publish
        if: inputs.dry-run == false
        # OIDC trusted publishing — mirrors the migrated publish-mcp-server job.
        # Requires a Trusted Publisher config for @totalreclaw/core on npmjs.com
        # pointing at this workflow file. NO `NODE_AUTH_TOKEN` env — setting it
        # short-circuits OIDC back to the expired secret-token path (E404).
        run: |
          cd rust/totalreclaw-core/pkg
          TAG="latest"
          if [ "${{ inputs.release-type }}" = "rc" ]; then
            TAG="rc"
          fi
          echo "Publishing with dist-tag: $TAG (OIDC trusted publishing)"
          npm publish --access public --tag "$TAG" --provenance 2>&1 || {
            # Tolerate "already published" — version already exists on registry
            if npm view @totalreclaw/core@$(node -e "console.log(require('./package.json').version)") version 2>/dev/null; then
              echo "Version already published, continuing"
            else
              exit 1
            fi
          }

      - name: Report version
        run: |
          node -e "const p = require('./rust/totalreclaw-core/pkg/package.json'); console.log('Published:', p.name + '@' + p.version)"

  publish-client:
    needs: [publish-core]
    if: |
      always() &&
      (inputs.package == 'client' || inputs.package == 'all') &&
      (needs.publish-core.result != 'cancelled')
    name: Publish @totalreclaw/client
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: cd client && rm -f package-lock.json && npm install --legacy-peer-deps

      - name: Build
        run: cd client && npm run build

      - name: Run tests
        run: cd client && npm test

      - name: Apply RC version suffix (rc mode only)
        if: inputs.release-type == 'rc'
        run: |
          cd client
          # In-workflow-only mutation; no version-bump commit to main.
          # Strip any existing -rc.<N> suffix and append a fresh one.
          node -e "
          const fs = require('fs');
          const p = require('./package.json');
          const base = p.version.split('-')[0];
          p.version = base + '-rc.${{ inputs.rc-number }}';
          fs.writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
          console.log('RC version:', p.version);
          "

      - name: Guard — refuse to republish an existing version
        if: inputs.dry-run == false
        # #456: an omitted `rc-number` silently defaulted to 1, republished
        # an already-existing rc.1, and the job still concluded success.
        # Fail BEFORE we ever attempt the publish so a stale/duplicate
        # version is loud, not a silent no-op.
        run: |
          cd client
          NAME=$(node -e "console.log(require('./package.json').name)")
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "ERROR: $NAME@$VERSION already published — refusing to republish (bump the version or rc-number)."
            exit 1
          fi
          echo "OK: $NAME@$VERSION not yet published, proceeding"

      - name: Publish
        if: inputs.dry-run == false
        run: |
          cd client
          TAG="latest"
          if [ "${{ inputs.release-type }}" = "rc" ]; then
            TAG="rc"
          fi
          echo "Publishing with dist-tag: $TAG"
          npm publish --access public --tag "$TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Report version
        run: |
          node -e "const p = require('./client/package.json'); console.log('Published:', p.name + '@' + p.version)"

  publish-mcp-server:
    needs: [publish-core, publish-client]
    if: |
      always() &&
      (inputs.package == 'mcp-server' || inputs.package == 'all') &&
      (needs.publish-core.result != 'cancelled') &&
      (needs.publish-client.result != 'cancelled')
    name: Publish @totalreclaw/mcp-server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      # `mcp/package.json` depends on `@totalreclaw/core@^2.5.x` from npm,
      # which the `publish-core` job above already published. `npm install`
      # resolves it from the registry — no local WASM build is needed.
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: cd mcp && rm -f package-lock.json && npm install --legacy-peer-deps

      - name: Build
        run: cd mcp && npm run build

      - name: Run tests
        run: cd mcp && npm test

      - name: Apply RC version suffix (rc mode only)
        if: inputs.release-type == 'rc'
        run: |
          cd mcp
          node -e "
          const fs = require('fs');
          const p = require('./package.json');
          const base = p.version.split('-')[0];
          p.version = base + '-rc.${{ inputs.rc-number }}';
          fs.writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
          console.log('RC version:', p.version);
          "

      - name: Guard — refuse to republish an existing version
        if: inputs.dry-run == false
        # #456: an omitted `rc-number` silently defaulted to 1, republished
        # an already-existing rc.1, and the job still concluded success.
        # Fail BEFORE we ever attempt the publish so a stale/duplicate
        # version is loud, not a silent no-op.
        run: |
          cd mcp
          NAME=$(node -e "console.log(require('./package.json').name)")
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "ERROR: $NAME@$VERSION already published — refusing to republish (bump the version or rc-number)."
            exit 1
          fi
          echo "OK: $NAME@$VERSION not yet published, proceeding"

      - name: Upgrade npm to latest (required for tokenless OIDC publish)
        if: inputs.dry-run == false
        # The npm CLI shipped with Node 22 (npm 10.x) signs provenance with
        # OIDC but still expects a legacy auth token for the actual PUT.
        # Tokenless OIDC trusted publishing (where the OIDC token IS the
        # auth) requires npm >= 11.5.1. Without this upgrade, the workflow
        # signed sigstore provenance successfully but the PUT 404'd
        # (2026-05-24 run 26374302750).
        run: |
          # Pinned to npm@11 — npm 12.0.0 (latest as of 2026-07-09) ships a broken
          # --provenance path (Cannot find module 'sigstore'). 11.x publishes fine.
          npm install -g npm@11
          npm --version

      - name: Publish
        if: inputs.dry-run == false
        # OIDC trusted publishing — npm trusts this workflow file
        # (`npm-publish.yml`) per the @totalreclaw/mcp-server package's
        # Trusted Publisher config on npmjs.com. NO `NODE_AUTH_TOKEN` env —
        # setting it would short-circuit OIDC and force npm to use the
        # secret-token path (which caused the 2026-05-19 / 2026-05-24 E404
        # failures after `NPM_TOKEN` expired).
        run: |
          cd mcp
          TAG="latest"
          if [ "${{ inputs.release-type }}" = "rc" ]; then
            TAG="rc"
          fi
          echo "Publishing with dist-tag: $TAG (OIDC trusted publishing)"
          npm publish --access public --tag "$TAG" --provenance

      - name: Report version
        run: |
          node -e "const p = require('./mcp/package.json'); console.log('Published:', p.name + '@' + p.version)"

  publish-nanoclaw:
    needs: [publish-core, publish-client]
    if: |
      always() &&
      (inputs.package == 'nanoclaw' || inputs.package == 'all') &&
      (needs.publish-core.result != 'cancelled') &&
      (needs.publish-client.result != 'cancelled')
    name: Publish @totalreclaw/skill-nanoclaw
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: cd skill-nanoclaw && rm -f package-lock.json && npm install --legacy-peer-deps

      - name: Build
        run: cd skill-nanoclaw && npm run build

      # Tests intentionally skipped: the existing hooks.test.js suite has
      # pre-existing failures on main (11 failing / 73 passing as of 5352cec)
      # unrelated to publishing. Re-enable once those are fixed.

      - name: Apply RC version suffix (rc mode only)
        if: inputs.release-type == 'rc'
        run: |
          cd skill-nanoclaw
          node -e "
          const fs = require('fs');
          const p = require('./package.json');
          const base = p.version.split('-')[0];
          p.version = base + '-rc.${{ inputs.rc-number }}';
          fs.writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
          console.log('RC version:', p.version);
          "

      - name: Guard — refuse to republish an existing version
        if: inputs.dry-run == false
        # #456: an omitted `rc-number` silently defaulted to 1, republished
        # an already-existing rc.1, and the "tolerate already published"
        # catch in the Publish step below let the job conclude success. Fail
        # BEFORE we ever attempt the publish so a stale/duplicate version is
        # loud, not a silent no-op.
        run: |
          cd skill-nanoclaw
          NAME=$(node -e "console.log(require('./package.json').name)")
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "ERROR: $NAME@$VERSION already published — refusing to republish (bump the version or rc-number)."
            exit 1
          fi
          echo "OK: $NAME@$VERSION not yet published, proceeding"

      - name: Publish
        if: inputs.dry-run == false
        run: |
          cd skill-nanoclaw
          TAG="latest"
          if [ "${{ inputs.release-type }}" = "rc" ]; then
            TAG="rc"
          fi
          echo "Publishing with dist-tag: $TAG"
          npm publish --access public --tag "$TAG" 2>&1 || {
            # Tolerate "already published" (403/409) — version already exists on registry
            if npm view @totalreclaw/skill-nanoclaw@$(node -e "console.log(require('./package.json').version)") version 2>/dev/null; then
              echo "Version already published, continuing"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Report version
        run: |
          node -e "const p = require('./skill-nanoclaw/package.json'); console.log('Published:', p.name + '@' + p.version)"

  publish-plugin:
    needs: [publish-core, publish-client]
    if: |
      always() &&
      (inputs.package == 'plugin' || inputs.package == 'all') &&
      (needs.publish-core.result != 'cancelled') &&
      (needs.publish-client.result != 'cancelled')
    name: Publish @totalreclaw/totalreclaw (OpenClaw plugin)
    runs-on: ubuntu-latest
    permissions:
      contents: write  # `write` so the post-publish step can `git push origin v<VERSION>` (rc.21 finding #8)
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: cd skill/plugin && rm -f package-lock.json && npm install --legacy-peer-deps

      # Defense-in-depth: block the publish if any plugin file would trip
      # OpenClaw's `env-harvesting` scanner rule. The same gate runs in
      # `publish-clawhub.yml`. We don't want npm to serve a tarball that
      # `openclaw plugins install @totalreclaw/totalreclaw` would then
      # refuse to install. `prepublishOnly` ALSO runs this script, but we
      # surface it explicitly here so a failure shows up as its own step.
      - name: Scanner-sim (env-harvesting false-positive check)
        run: cd skill/plugin && npm run check-scanner

      # Issue #110 fix 1 (rc.18 manual QA): plugin used to ship raw `.ts`
      # source — `index.ts` did `import './crypto.js'` but only `crypto.ts`
      # existed. Gateway TS-loader masked this, but CLI subcommand paths
      # that resolved literal `./crypto.js` failed. Build + verify gates
      # below ensure every `.js` import target ships as a real file.
      - name: Build plugin (.ts -> dist/.js)
        run: cd skill/plugin && npm run build

      - name: Run plugin tests (asserts manifest, phrase-safety registry, import-time budget)
        run: cd skill/plugin && npm test

      - name: Verify tarball ships built `.js` artifacts (issue #110)
        run: cd skill/plugin && npm run verify-tarball

      # Issue #124 (rc.20 ship-stopper): the published `dist/index.js` had
      # three runtime `require()` calls under `"type":"module"`. The
      # tarball-smoke step below imports the entry, but `require()`s on
      # lazy paths (extractor, hot-cache, plugin-version reader) don't
      # fire on import alone. This grep+exec gate scans every dist/*.js
      # for bare `require(` outside comments AND executes the dist in a
      # clean ESM process. Fail-fast at publish, never reach the registry.
      - name: ESM-shape smoke (issue #124 — bare require regression)
        run: cd skill/plugin && npm run smoke:dist

      - name: Smoke-import the plugin module from a clean Node env
        run: |
          cd skill/plugin
          # Pack and install to /tmp to verify the published shape works
          # the way an end-user `openclaw plugins install` would see it.
          TARBALL=$(npm pack 2>/dev/null | tail -1)
          mkdir -p /tmp/plugin-smoke && cd /tmp/plugin-smoke
          npm init -y >/dev/null
          npm install "${GITHUB_WORKSPACE}/skill/plugin/${TARBALL}" --no-save --legacy-peer-deps
          # Import the entry — must complete in <5s and not require network.
          timeout 10 node --input-type=module -e "
            const start = Date.now();
            const mod = await import('@totalreclaw/totalreclaw');
            const elapsed = Date.now() - start;
            if (typeof mod.default !== 'object' || mod.default?.id !== 'totalreclaw') {
              console.error('Expected default export with id=totalreclaw, got:', mod.default);
              process.exit(1);
            }
            if (elapsed > 5000) {
              console.error('Plugin import took', elapsed, 'ms (>5000ms budget) — possible eager ONNX regression (issue #110 fix 2)');
              process.exit(1);
            }
            console.log('OK: plugin imports cleanly from clean Node env in', elapsed, 'ms');
          " || { echo 'ERROR: plugin tarball failed clean-Node smoke import'; exit 1; }

      - name: Apply RC version suffix (rc mode only)
        if: inputs.release-type == 'rc'
        run: |
          cd skill/plugin
          node -e "
          const fs = require('fs');
          const p = require('./package.json');
          const base = p.version.split('-')[0];
          p.version = base + '-rc.${{ inputs.rc-number }}';
          fs.writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
          console.log('RC version:', p.version);
          "

      # 3.3.12-rc.1 (F flip): source already binds to production for both
      # release-types. No publish-time URL rewrite is needed. The guard
      # below delegates to skill/scripts/check-url-binding.mjs which
      # enforces: skill.json default field = production; no JS-side
      # default-URL literal bound to staging; production URL present
      # somewhere in the artifact tree.
      - name: Stable / RC URL guard (post-F-flip — production for both)
        run: node skill/scripts/check-url-binding.mjs --release-type=${{ inputs.release-type }}

      # Propagate the (possibly RC-mutated) package.json::version into
      # SKILL.md frontmatter and skill.json, then GATE the publish on
      # those three sites being aligned. Catches the rc.21 drift class
      # (package.json says rc.21, SKILL.md says rc.11, skill.json says
      # 1.6.2) BEFORE we publish a confused tarball. See
      # skill/scripts/sync-version.mjs + check-version-drift.mjs.
      - name: Sync bundled-tarball version sites + drift gate
        run: |
          cd skill/plugin
          node ../scripts/sync-version.mjs
          node ../scripts/check-version-drift.mjs

      - name: Guard — refuse to republish an existing version
        if: inputs.dry-run == false
        # #456: an omitted `rc-number` silently defaulted to 1, republished
        # an already-existing rc.1, and the "tolerate already published"
        # catch in the Publish step below let the job conclude success. Fail
        # BEFORE we ever attempt the publish so a stale/duplicate version is
        # loud, not a silent no-op.
        run: |
          cd skill/plugin
          NAME=$(node -e "console.log(require('./package.json').name)")
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "ERROR: $NAME@$VERSION already published — refusing to republish (bump the version or rc-number)."
            exit 1
          fi
          echo "OK: $NAME@$VERSION not yet published, proceeding"

      - name: Upgrade npm to latest (required for tokenless OIDC publish)
        if: inputs.dry-run == false
        # npm 10.x (Node 22) signs provenance with OIDC but still PUTs with a
        # legacy token → E404 after NPM_TOKEN expired (the 2026-06-07 core run).
        # Tokenless OIDC (the OIDC token IS the auth) needs npm >= 11.5.1.
        # Mirrors publish-core / publish-mcp-server (migrated off NPM_TOKEN).
        run: |
          # Pinned to npm@11 — npm 12.0.0 (latest as of 2026-07-09) ships a broken
          # --provenance path (Cannot find module 'sigstore'). 11.x publishes fine.
          npm install -g npm@11
          npm --version

      - name: Publish
        if: inputs.dry-run == false
        # OIDC trusted publishing — mirrors publish-core / publish-mcp-server.
        # Requires a Trusted Publisher config for @totalreclaw/totalreclaw on
        # npmjs.com pointing at this workflow file. NO `NODE_AUTH_TOKEN` env —
        # setting it short-circuits OIDC back to the expired secret-token path
        # (the 2026-06-22 E404 that blocked 3.3.12-rc.13).
        run: |
          cd skill/plugin
          TAG="latest"
          if [ "${{ inputs.release-type }}" = "rc" ]; then
            TAG="rc"
          fi
          echo "Publishing with dist-tag: $TAG (OIDC trusted publishing)"
          npm publish --access public --tag "$TAG" --provenance 2>&1 || {
            # Tolerate "already published" (403/409) — version already exists on registry
            if npm view @totalreclaw/totalreclaw@$(node -e "console.log(require('./package.json').version)") version 2>/dev/null; then
              echo "Version already published, continuing"
            else
              exit 1
            fi
          }
        env:
          # Forwarded to `prepublishOnly` -> check-url-binding.mjs so it
          # asserts the right URL invariant for the release type. NOT a publish
          # auth token — OIDC publish is tokenless (no NODE_AUTH_TOKEN).
          TOTALRECLAW_RELEASE_TYPE: ${{ inputs.release-type }}

      - name: Report version
        id: report
        run: |
          VERSION=$(node -e "console.log(require('./skill/plugin/package.json').version)")
          echo "Published: @totalreclaw/totalreclaw@${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # Tag the source SHA the workflow published from. Idempotent: if the
      # tag already exists on the remote (re-run, manual backfill), skip.
      # Uses the RESOLVED version (e.g. 3.3.1-rc.22), so RCs and stables
      # both get a tag. Closes the rc.21 finding #8 gap (no `v3.3.1-rc.*`
      # tags in the public repo, only stables up to v3.0.4).
      - name: Tag git commit with published version
        if: inputs.dry-run == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.report.outputs.version }}"
          TAG="v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}$"; then
            echo "Tag ${TAG} already exists on origin, skipping"
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git tag "${TAG}"
          git push origin "${TAG}"
          echo "Tagged: ${TAG}"
          node -e "const p = require('./skill/plugin/package.json'); console.log('Published:', p.name + '@' + p.version)"

  # ---------------------------------------------------------------------------
  # Lazy-embedder bundle (3.3.1-rc.22+)
  # ---------------------------------------------------------------------------
  #
  # rc.21 NO-GO: `openclaw plugins install @totalreclaw/totalreclaw` OOM-killed
  # the OpenClaw gateway on a 3.7 GB Hetzner VPS — the plugin's runtime
  # dependencies (`@huggingface/transformers` + `onnxruntime-node`) required
  # ~700 MB peak install RAM and tipped the host over.
  #
  # rc.22 fix: those heavy deps are no longer in the plugin's `dependencies`.
  # On first call to `embed()` the plugin downloads `embedder-v1.tar.gz`
  # from this GitHub Release, verifies the SHA-256 against the manifest, and
  # extracts to `~/.totalreclaw/embedder/v1/`. This job builds the bundle and
  # uploads it to the release tagged `v<plugin-version>` so the plugin's
  # static URL template resolves it correctly.
  #
  # The bundle is identical for stable + RC publishes — same code, same model,
  # same vector space. The release tag is what differs (`v3.3.1-rc.22` vs
  # `v3.3.2`).
  publish-embedder-bundle:
    needs: [publish-plugin]
    if: |
      always() &&
      (inputs.package == 'plugin' || inputs.package == 'all') &&
      (needs.publish-plugin.result == 'success') &&
      (inputs.dry-run == false)
    name: Build + upload embedder-v1 bundle to GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required by gh release upload
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Compute release tag
        id: tag
        run: |
          PLUGIN_VERSION=$(node -e "console.log(require('./skill/plugin/package.json').version)")
          if [ "${{ inputs.release-type }}" = "rc" ]; then
            BASE=${PLUGIN_VERSION%-*}
            TAG="v${BASE}-rc.${{ inputs.rc-number }}"
          else
            TAG="v${PLUGIN_VERSION}"
          fi
          echo "Release tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build embedder bundle
        run: |
          mkdir -p dist/embedder
          node scripts/build-embedder-bundle.mjs --out-dir dist/embedder
          ls -la dist/embedder/

      - name: Ensure GitHub Release exists for the tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # `gh release view` exits non-zero if the release doesn't exist.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Creating GitHub Release for tag $TAG"
            FLAGS=""
            if [ "${{ inputs.release-type }}" = "rc" ]; then
              FLAGS="--prerelease"
            fi
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Auto-generated release for embedder bundle attachment. See CHANGELOG-public.md for details." \
              $FLAGS \
              --target "${GITHUB_SHA}"
          else
            echo "Release $TAG already exists; will upload bundle assets to it."
          fi

      - name: Upload embedder bundle + manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # `gh release upload --clobber` replaces existing assets with the
          # same name so re-runs of this job do not error out. The bundle is
          # deterministic for a given commit; clobbering is safe.
          gh release upload "$TAG" \
            dist/embedder/embedder-v1.tar.gz \
            dist/embedder/embedder-v1.manifest.json \
            --clobber

      - name: Report bundle URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "Embedder bundle: https://github.com/${{ github.repository }}/releases/download/${TAG}/embedder-v1.tar.gz"
          echo "Manifest:       https://github.com/${{ github.repository }}/releases/download/${TAG}/embedder-v1.manifest.json"
