name: Feature request
description: Suggest an improvement or a new capability.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation where TotalReclaw falls short for you today.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: Which client(s) does this concern?
      multiple: true
      options:
        - OpenClaw plugin
        - MCP server (Claude Desktop / Cursor / Windsurf)
        - Python / Hermes
        - ZeroClaw / Rust
        - NanoClaw
        - Vault web app
        - All / cross-client
