<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 530" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', Menlo, monospace">

  <rect width="840" height="530" fill="#0d1117"/>

  <!-- Title -->
  <text x="420" y="30" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="700" font-family="'Segoe UI', system-ui, sans-serif">TotalReclaw — Architecture Overview</text>
  <text x="420" y="46" text-anchor="middle" fill="#7d8590" font-size="9.5" letter-spacing="1.8" font-family="'Segoe UI', system-ui, sans-serif">END-TO-END ENCRYPTED MEMORY FOR AI AGENTS — PORTABLE, YOURS FOREVER</text>

  <!-- ═══════════════════════════════════════ -->
  <!--  LAYER 1: PERSONAL AI AGENTS           -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="28" y="64" width="784" height="72" rx="7" fill="#161b22" stroke="#6366f1" stroke-width="0.8"/>
  <text x="46" y="82" fill="#818cf8" font-size="9" font-weight="700" letter-spacing="1.5">PERSONAL AI AGENTS</text>

  <rect x="46" y="92" width="140" height="30" rx="5" fill="#1e1b4b" stroke="#818cf8" stroke-width="0.8"/>
  <text x="116" y="111" text-anchor="middle" fill="#c7d2fe" font-size="9.5" font-weight="700">OpenClaw</text>

  <rect x="198" y="92" width="140" height="30" rx="5" fill="#1e1b4b" stroke="#818cf8" stroke-width="0.8"/>
  <text x="268" y="111" text-anchor="middle" fill="#c7d2fe" font-size="9.5" font-weight="700">NanoClaw</text>

  <rect x="350" y="92" width="140" height="30" rx="5" fill="#1e1b4b" stroke="#818cf8" stroke-width="0.8"/>
  <text x="420" y="111" text-anchor="middle" fill="#c7d2fe" font-size="9.5" font-weight="700">Claude Desktop</text>

  <rect x="502" y="92" width="140" height="30" rx="5" fill="#161b22" stroke="#30363d" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="572" y="111" text-anchor="middle" fill="#7d8590" font-size="9.5" font-weight="600">Any Agent</text>

  <text x="710" y="106" fill="#6366f1" font-size="8.5" font-weight="600" text-anchor="middle">MCP or</text>
  <text x="710" y="118" fill="#6366f1" font-size="8.5" font-weight="600" text-anchor="middle">REST API</text>

  <!-- Down arrow: agents → client -->
  <line x1="420" y1="136" x2="420" y2="156" stroke="#818cf8" stroke-width="1.4"/>
  <polygon points="420,160 415,152 425,152" fill="#818cf8"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  LAYER 2: CLIENT-SIDE                  -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="28" y="164" width="784" height="68" rx="7" fill="#161b22" stroke="#8b5cf6" stroke-width="1.2"/>
  <rect x="28" y="164" width="784" height="28" rx="7" fill="#8b5cf6"/>
  <rect x="28" y="184" width="784" height="8" fill="#8b5cf6"/>
  <text x="46" y="183" fill="#f5f3ff" font-size="11" font-weight="700" font-family="'Segoe UI', system-ui, sans-serif">CLIENT-SIDE <tspan font-size="9.5" font-weight="500">(runs locally)</tspan></text>
  <text x="780" y="183" fill="#e9d5ff" font-size="8.5" font-weight="600" text-anchor="end">all plaintext stays here ✓</text>

  <text x="46" y="207" fill="#d1d5db" font-size="10">Encrypts memories, builds blind search indices, extracts facts, re-ranks results</text>
  <text x="46" y="224" fill="#7d8590" font-size="9">Keys derived from a 12-word recovery phrase — reads own encrypted data directly from The Graph</text>

  <!-- Down arrows: client → relay -->
  <rect x="168" y="232" width="70" height="15" rx="3" fill="#0d1117" stroke="#a78bfa" stroke-width="0.6"/>
  <text x="203" y="243" text-anchor="middle" fill="#a78bfa" font-size="7.5" font-weight="700">ciphertext</text>
  <line x1="203" y1="247" x2="203" y2="266" stroke="#a78bfa" stroke-width="1.4"/>
  <polygon points="203,270 198,262 208,262" fill="#a78bfa"/>

  <rect x="500" y="232" width="84" height="15" rx="3" fill="#0d1117" stroke="#67e8f9" stroke-width="0.6"/>
  <text x="542" y="243" text-anchor="middle" fill="#67e8f9" font-size="7.5" font-weight="700">blind trapdoors</text>
  <line x1="542" y1="247" x2="542" y2="266" stroke="#67e8f9" stroke-width="1.4"/>
  <polygon points="542,270 537,262 547,262" fill="#67e8f9"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  LAYER 3: TOTALRECLAW RELAY            -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="28" y="274" width="660" height="56" rx="7" fill="#161b22" stroke="#06b6d4" stroke-width="0.8"/>
  <text x="46" y="294" fill="#67e8f9" font-size="9" font-weight="700" letter-spacing="1.5">TOTALRECLAW RELAY SERVICE</text>
  <text x="656" y="294" fill="#f87171" font-size="8.5" font-weight="600" text-anchor="end">never sees plaintext ✗</text>

  <text x="46" y="314" fill="#d1d5db" font-size="10">Routes encrypted data, matches blind indices, sponsors memory writes</text>
  <text x="46" y="324" fill="#7d8590" font-size="9"></text>

  <!-- Self-host option (de-emphasized) -->
  <rect x="700" y="274" width="112" height="56" rx="7" fill="#161b22" stroke="#30363d" stroke-width="0.7" stroke-dasharray="4,3"/>
  <text x="756" y="296" text-anchor="middle" fill="#4b5563" font-size="8" font-weight="600" letter-spacing="0.5">SELF-HOSTED</text>
  <text x="756" y="310" text-anchor="middle" fill="#4b5563" font-size="8.5">API + PostgreSQL</text>
  <text x="756" y="324" text-anchor="middle" fill="#3b4048" font-size="8">optional</text>

  <!-- Down arrow: relay → network -->
  <rect x="318" y="330" width="48" height="15" rx="3" fill="#0d1117" stroke="#34d399" stroke-width="0.6"/>
  <text x="342" y="341" text-anchor="middle" fill="#34d399" font-size="7.5" font-weight="700">store</text>
  <line x1="342" y1="345" x2="342" y2="362" stroke="#34d399" stroke-width="1.4"/>
  <polygon points="342,366 337,358 347,358" fill="#34d399"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  LAYER 4: OPEN GLOBAL NETWORK          -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="28" y="370" width="784" height="100" rx="7" fill="#161b22" stroke="#10b981" stroke-width="1.2"/>
  <rect x="28" y="370" width="784" height="28" rx="7" fill="#059669"/>
  <rect x="28" y="390" width="784" height="8" fill="#059669"/>
  <text x="46" y="389" fill="#ecfdf5" font-size="11" font-weight="700" font-family="'Segoe UI', system-ui, sans-serif">OPEN AUDITABLE NETWORK <tspan font-size="9.5" font-weight="500">(Storage Layer)</tspan></text>
  <text x="780" y="389" fill="#a7f3d0" font-size="8.5" font-weight="600" text-anchor="end">full privacy and data sovereignty</text>

  <!-- Gnosis Chain -->
  <rect x="46" y="408" width="230" height="46" rx="5" fill="#0a1f16" stroke="#047857" stroke-width="0.7"/>
  <text x="161" y="427" text-anchor="middle" fill="#6ee7b7" font-size="9.5" font-weight="700">Gnosis Blockchain</text>
  <text x="161" y="443" text-anchor="middle" fill="#d1d5db" font-size="9">Permanent encrypted memory storage</text>

  <!-- Arrow: chain → graph -->
  <line x1="276" y1="431" x2="310" y2="431" stroke="#34d399" stroke-width="1.2"/>
  <polygon points="310,427 318,431 310,435" fill="#34d399"/>

  <!-- The Graph -->
  <rect x="322" y="408" width="230" height="46" rx="5" fill="#0a1f16" stroke="#34d399" stroke-width="1.4"/>
  <text x="437" y="427" text-anchor="middle" fill="#6ee7b7" font-size="9.5" font-weight="700">The Graph</text>
  <text x="437" y="443" text-anchor="middle" fill="#d1d5db" font-size="9">Memory indexing and retrieval API</text>

  <!-- Recovery -->
  <rect x="576" y="408" width="218" height="46" rx="5" fill="#0a1f16" stroke="#047857" stroke-width="0.7" stroke-dasharray="4,3"/>
  <text x="685" y="427" text-anchor="middle" fill="#6ee7b7" font-size="9.5" font-weight="700">Recovery</text>
  <text x="685" y="443" text-anchor="middle" fill="#d1d5db" font-size="9">Always recoverable, no third parties</text>

  <!-- Read / Recover arrow: Client → Network (right side, bypasses relay) -->
  <line x1="812" y1="192" x2="820" y2="192" stroke="#34d399" stroke-width="1.2" stroke-dasharray="6,4"/>
  <line x1="820" y1="192" x2="820" y2="431" stroke="#34d399" stroke-width="1.2" stroke-dasharray="6,4"/>
  <line x1="820" y1="431" x2="816" y2="431" stroke="#34d399" stroke-width="1.2" stroke-dasharray="6,4"/>
  <polygon points="816,427 816,435 808,431" fill="#34d399"/>
  <rect x="810" y="286" width="22" height="82" rx="3" fill="#0d1117"/>
  <text transform="translate(825,340) rotate(90)" text-anchor="middle" fill="#34d399" font-size="7" font-weight="700" letter-spacing="1">READ / RECOVER</text>

  <!-- Footer -->
  <text x="420" y="498" text-anchor="middle" fill="#30363d" font-size="9" font-family="'Segoe UI', system-ui, sans-serif">github.com/p-diogo/totalreclaw · totalreclaw.xyz · MIT / AGPL</text>

</svg>